function ProgressBar({ pct, color }) {
  return (
    <div className="progress-track" style={{ marginBottom:14 }}>
      <div className="progress-fill" style={{ width:`${pct}%`, background:color }}/>
    </div>
  );
}

function Ring({ pct, size=64, label, color }) {
  const r = 26; const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <div style={{ textAlign:'center' }}>
      <svg width={size} height={size} viewBox="0 0 60 60" className="ring-svg">
        <circle cx="30" cy="30" r={r} fill="none" stroke="#2E2850" strokeWidth="5"/>
        <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition:'stroke-dasharray 0.5s ease' }}/>
      </svg>
      <div style={{ fontFamily:'Crimson Pro', fontSize:11, color:'#6B5F4F', marginTop:2 }}>{label}</div>
      <div style={{ fontFamily:'JetBrains Mono', fontSize:11, color, marginTop:1 }}>{pct}%</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   VOCAB DRILL
══════════════════════════════════════════════════════ */
function VocabDrill({ progress, onProgress }) {
  const [mode, setMode] = useState('card');
  const [idx, setIdx]   = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [animKey, setAnimKey] = useState(0);

  const mastered = progress?.mastered || [];
  const word = VOCAB[idx];

  const toggleMaster = () => {
    const nm = mastered.includes(word.word) ? mastered.filter(w=>w!==word.word) : [...mastered, word.word];
    onProgress({ ...progress, mastered:nm });
  };

  const nav = dir => {
    if (mode==='card') {
      setIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);
      setFlipped(false);
      setAnimKey(k=>k+1);
    } else {
      setQIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);
      setSelected(null);
      setAnswered(false);
    }
  };

  const quizWord = VOCAB[qIdx];
  const quizOpts = (() => {
    const correct = quizWord.def;
    const others = VOCAB.filter(v=>v.word!==quizWord.word).map(v=>v.def).sort(()=>Math.random()-0.5).slice(0,3);
    const all = [correct, ...others].sort(()=>Math.random()-0.5);
    return all;
  })();

  const handleQuizSelect = opt => {
    if (answered) return;
    setSelected(opt); setAnswered(true);
    if (opt===quizWord.def) {
      const nm = mastered.includes(quizWord.word) ? mastered : [...mastered, quizWord.word];
      onProgress({ ...progress, mastered:nm });
    }
  };

  const current = mode==='card' ? idx : qIdx;

  return (
    <div>
      <SectionHeader color="#C8A84B" supra="Verbal Reasoning" title="Vocabulary" counter={`${current+1} / ${VOCAB.length}`}/>
      <div style={{ padding:'14px 14px 0' }}>
        {/* Mode toggle */}
        <div style={{ display:'flex', background:'#0D0A1A', borderRadius:8, padding:3, gap:3, marginBottom:14 }}>
          {['card','quiz'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setFlipped(false);}} style={{ flex:1, padding:'7px 0', borderRadius:6, border:'none', cursor:'pointer', background:mode===m?'#1C1730':'transparent', color:mode===m?'#C8A84B':'#6B5F4F', fontFamily:'Crimson Pro', fontSize:14, fontWeight:mode===m?600:400, transition:'all 0.18s' }}>
              {m==='card'?'Flashcard':'Quiz Mode'}
            </button>
          ))}
        </div>
        <div style={{ marginBottom:4 }}>
          <ProgressBar pct={mastered.length/VOCAB.length*100} color="#C8A84B"/>
        </div>
        <div style={{ color:'#6B5F4F', fontSize:11, fontFamily:'Crimson Pro', textAlign:'right', marginTop:-10, marginBottom:12 }}>{mastered.length} of {VOCAB.length} mastered</div>

        {mode==='card' ? (
          <>
            <div key={animKey} className="fade-up" onClick={()=>setFlipped(f=>!f)} style={{ background:'#161225', border:'1px solid #2E2850', borderRadius:14, padding:'28px 20px', minHeight:200, cursor:'pointer', userSelect:'none', marginBottom:14, position:'relative', display:'flex', flexDirection:'column', justifyContent:'center' }}>
              <div style={{ position:'absolute', top:12, right:14, fontFamily:'Crimson Pro', fontSize:11, color:'#4A3F6B' }}>tap to flip</div>
              {!flipped ? (
                <div style={{ textAlign:'center' }}>
                  <div className="playfair" style={{ fontSize:28, fontWeight:700, color:'#F2E8D0', marginBottom:10 }}>{word.word}</div>
                  <div style={{ fontFamily:'Crimson Pro', fontSize:13, color:'#6B5F4F', fontStyle:'italic' }}>{word.root}</div>
                </div>
              ) : (
                <div className="fade-up">
                  <div className="playfair" style={{ fontSize:18, fontWeight:600, color:'#C8A84B', marginBottom:10 }}>{word.word}</div>
                  <div style={{ fontFamily:'Crimson Pro', fontSize:16, color:'#F2E8D0', lineHeight:1.55, marginBottom:10 }}>{word.def}</div>
                  <div style={{ fontFamily:'Crimson Pro', fontSize:14, color:'#9E8F75', fontStyle:'italic', lineHeight:1.5 }}>"{word.ex}"</div>
                </div>
              )}
            </div>
            <div style={{ display:'flex', gap:8, marginBottom:14 }}>
              <button onClick={()=>nav(-1)} style={{ width:44, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#9E8F75', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><ChevL s={18}/></button>
              <button onClick={toggleMaster} style={{ flex:1, height:44, borderRadius:8, border:`1px solid ${mastered.includes(word.word)?'#C8A84B44':'#2E2850'}`, background:mastered.includes(word.word)?'#C8A84B22':'#161225', color:mastered.includes(word.word)?'#C8A84B':'#9E8F75', fontFamily:'Crimson Pro', fontSize:14, cursor:'pointer' }}>
                {mastered.includes(word.word) ? '★ Mastered' : '☆ Mark mastered'}
              </button>
              <button onClick={()=>nav(1)} style={{ width:44, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#C8A84B', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><ChevR s={18}/></button>
            </div>
          </>
        ) : (
          <>
            <div style={{ background:'#161225', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
              <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:10 }}>Define the word</div>
              <div className="playfair" style={{ fontSize:22, fontWeight:700, color:'#F2E8D0' }}>{quizWord.word}</div>
              <div style={{ fontFamily:'Crimson Pro', fontSize:12, color:'#6B5F4F', fontStyle:'italic', marginTop:4 }}>{quizWord.root}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:14 }}>
              {quizOpts.map((opt,i) => {
                let cls = 'opt-btn';
                if (answered) { if(opt===quizWord.def) cls+=' ok'; else if(opt===selected) cls+=' bad'; }
                else if(opt===selected) cls+=' sel';
                return <button key={i} className={cls} disabled={answered} onClick={()=>handleQuizSelect(opt)}>{opt}</button>;
              })}
            </div>
            {answered && <ExplanationBox correct={selected===quizWord.def} text={`"${quizWord.word}" — ${quizWord.def} "${quizWord.ex}"`}/>}
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>nav(-1)} style={{ width:44, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#9E8F75', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><ChevL s={18}/></button>
              <button onClick={()=>nav(1)} style={{ flex:1, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#C8A84B', cursor:'pointer', fontFamily:'Crimson Pro', fontSize:15, display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>
                Next Word <ChevR s={16}/>
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   GRAMMAR DRILL
══════════════════════════════════════════════════════ */
function GrammarDrill({ progress, onProgress }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [done, setDone] = useState(false);

  const correct = progress?.correct || [];
  const wrong   = progress?.wrong   || [];
  const q = GRAMMAR[idx];

  const handleSelect = i => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    const ok = i===q.ans;
    if (ok  && !correct.includes(q.id)) onProgress({ ...progress, correct:[...correct,q.id], wrong:wrong.filter(w=>w!==q.id) });
    if (!ok && !wrong.includes(q.id))   onProgress({ ...progress, wrong:[...wrong,q.id], correct:correct.filter(c=>c!==q.id) });
  };

  const next = () => {
    if (idx < GRAMMAR.length-1) { setIdx(i=>i+1); setSelected(null); setAnswered(false); }
    else setDone(true);
  };

  if (done) return (
    <>
      <SectionHeader color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice"/>
      <ResultCard correct={correct.length} total={GRAMMAR.length} color="#B87A6A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/>
    </>
  );

  return (
    <div>
      <SectionHeader color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice" counter={`${idx+1}/${GRAMMAR.length}`}/>
      <div style={{ padding:'14px' }}>
        <ProgressBar pct={(idx/GRAMMAR.length)*100} color="#B87A6A"/>
        <div style={{ background:'#1C1730', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
          <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:10 }}>Question {idx+1}</div>
          <div style={{ color:'#F2E8D0', fontSize:16, lineHeight:1.55, fontFamily:'Crimson Pro' }}>{q.q}</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:14 }}>
          {q.opts.map((opt,i) => {
            let cls='opt-btn';
            if(answered){ if(i===q.ans) cls+=' ok'; else if(selected===i) cls+=' bad'; }
            else if(selected===i) cls+=' sel';
            return <button key={i} className={cls} disabled={answered} onClick={()=>handleSelect(i)}>
              <span style={{ fontFamily:'JetBrains Mono', fontSize:10, color:'#6B5F4F', marginRight:6 }}>{String.fromCharCode(65+i)}.</span>{opt}
            </button>;
          })}
        </div>
        {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
        {answered && <NextButton onClick={next} label={idx<GRAMMAR.length-1?'Next Question':'See Results'} color="#B87A6A"/>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   READING DRILL
══════════════════════════════════════════════════════ */
function ReadingDrill({ progress, onProgress }) {
  const [pIdx, setPIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [view, setView] = useState('passage'); // 'passage' | 'question'

  const correct = progress?.correct || [];
  const wrong   = progress?.wrong   || [];
  const passage = PASSAGES[pIdx];
  const q       = passage.qs[qIdx];
  const qId     = `${pIdx}-${qIdx}`;

  const handleSelect = i => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    const ok = i===q.ans;
    if (ok  && !correct.includes(qId)) onProgress({ ...progress, correct:[...correct,qId], wrong:wrong.filter(w=>w!==qId) });
    if (!ok && !wrong.includes(qId))   onProgress({ ...progress, wrong:[...wrong,qId], correct:correct.filter(c=>c!==qId) });
  };

  const next = () => {
    if (qIdx < passage.qs.length-1) { setQIdx(i=>i+1); setSelected(null); setAnswered(false); setView('question'); }
    else if (pIdx < PASSAGES.length-1) { setPIdx(i=>i+1); setQIdx(0); setSelected(null); setAnswered(false); setView('passage'); }
    // else done (just show last result)
  };

  const rTotal = PASSAGES.reduce((a,p)=>a+p.qs.length,0);
  const rDone  = PASSAGES.slice(0,pIdx).reduce((a,p)=>a+p.qs.length,0) + qIdx;

  return (
    <div>
      <SectionHeader color="#7A9EC8" supra="Reading Comprehension" title="Classical Passages" counter={`${pIdx+1}/${PASSAGES.length}`}/>
      <div style={{ padding:'14px' }}>
        <ProgressBar pct={(rDone/rTotal)*100} color="#7A9EC8"/>

        {/* Toggle */}
        <div style={{ display:'flex', background:'#0D0A1A', borderRadius:8, padding:3, gap:3, marginBottom:14 }}>
          {['passage','question'].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{ flex:1, padding:'7px 0', borderRadius:6, border:'none', cursor:'pointer', background:view===v?'#1C1730':'transparent', color:view===v?'#7A9EC8':'#6B5F4F', fontFamily:'Crimson Pro', fontSize:14, fontWeight:view===v?600:400, transition:'all 0.18s' }}>
              {v==='passage'?'Passage':'Question'}
            </button>
          ))}
        </div>

        {view==='passage' ? (
          <>
            <div style={{ background:'#161225', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
              <div style={{ color:'#7A9EC8', fontSize:12, fontFamily:'Crimson Pro', fontStyle:'italic', marginBottom:12, opacity:0.8 }}>{passage.title}</div>
              {passage.text.split('\n\n').map((para,i)=>(
                <p key={i} style={{ fontFamily:'Crimson Pro', fontSize:15, lineHeight:1.7, color:'#D4C8B0', margin:i===0?0:'12px 0 0' }}>{para.trim()}</p>
              ))}
            </div>
            <NextButton onClick={()=>setView('question')} label="Go to Questions" color="#7A9EC8"/>
          </>
        ) : (
          <>
            <div style={{ background:'#1C1730', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
              <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:10 }}>Question {qIdx+1} of {passage.qs.length}</div>
              <div style={{ color:'#F2E8D0', fontSize:16, lineHeight:1.55, fontFamily:'Crimson Pro' }}>{q.q}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:14 }}>
              {q.opts.map((opt,i)=>{
                let cls='opt-btn';
                if(answered){ if(i===q.ans) cls+=' ok'; else if(selected===i) cls+=' bad'; }
                else if(selected===i) cls+=' sel';
                return <button key={i} className={cls} disabled={answered} onClick={()=>handleSelect(i)}>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:10, color:'#6B5F4F', marginRight:6 }}>{String.fromCharCode(65+i)}.</span>{opt}
                </button>;
              })}
            </div>
            {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
            {answered && (pIdx<PASSAGES.length-1 || qIdx<passage.qs.length-1) && (
              <NextButton onClick={next} label={qIdx<passage.qs.length-1?'Next Question':'Next Passage'} color="#7A9EC8"/>
            )}
          </>
        )}
      </div>
    </div>
  );
}

  return (
    <div>
      <SectionHeader color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice" counter={`${idx+1}/${MATH.length}`}/>
      <div style={{ padding:'14px' }}>
        <ProgressBar pct={(idx/MATH.length)*100} color="#8AB87A"/>
        <div style={{ background:'#1C1730', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
          <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:10 }}>Problem {idx+1}</div>
          <div style={{ color:'#F2E8D0', fontSize:17, lineHeight:1.55, fontFamily:'Crimson Pro' }}>{q.q}</div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:14 }}>
          {q.opts.map((opt,i)=>{
            let cls='opt-btn';
            if(answered){ if(i===q.ans) cls+=' ok'; else if(selected===i) cls+=' bad'; }
            else if(selected===i) cls+=' sel';
            return (
              <button key={i} className={cls} disabled={answered} onClick={()=>handleSelect(i)} style={{ textAlign:'center', padding:'14px 8px' }}>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:10, opacity:0.38 }}>{String.fromCharCode(65+i)}</span>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:20, fontWeight:500 }}>{opt}</span>
                </div>
              </button>
            );
          })}
        </div>
        {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
        {answered && <NextButton onClick={next} label={idx<MATH.length-1?'Next Problem':'See Results'} color="#8AB87A"/>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('home');
  const [progress, setProgress] = useState(()=>{
    const s = gs('progress');
    return s || { vocab:{mastered:[],seen:[]}, grammar:{correct:[],wrong:[]}, reading:{correct:[],wrong:[]}, math:{correct:[],wrong:[]} };
  });

  const save = (key, val) => {
    const np = { ...progress, [key]:val };
    setProgress(np); ss('progress', np);
  };

  const tabs = [
    { id:'home',    label:'Home',    Icon:HomeIcon,   color:'#C8A84B' },
    { id:'verbal',  label:'Verbal',  Icon:BookIcon,   color:'#C8A84B' },
    { id:'grammar', label:'Grammar', Icon:PenIcon,    color:'#B87A6A' },
    { id:'reading', label:'Reading', Icon:ScrollIcon, color:'#7A9EC8' },
    { id:'math',    label:'Math',    Icon:SigmaIcon,  color:'#8AB87A' },
  ];

  return (
    <div style={{ background:'#0D0A1A', minHeight:'100vh', fontFamily:"'Crimson Pro',Georgia,serif" }}>
      <main style={{ paddingBottom:72, minHeight:'100vh' }}>
        <div className="fade-up" key={tab}>
          {tab==='home'    && <HomeScreen progress={progress} onTab={setTab}/>}
          {tab==='verbal'  && <VocabDrill   progress={progress.vocab}   onProgress={v=>save('vocab',v)}/>}
          {tab==='grammar' && <GrammarDrill progress={progress.grammar} onProgress={v=>save('grammar',v)}/>}
          {tab==='reading' && <ReadingDrill progress={progress.reading} onProgress={v=>save('reading',v)}/>}
          {tab==='math'    && <MathDrill    progress={progress.math}    onProgress={v=>save('math',v)}/>}
        </div>
      </main>
      <nav style={{ position:'fixed', bottom:0, left:0, right:0, background:'rgba(13,10,26,0.97)', borderTop:'1px solid #2E2850', display:'flex', zIndex:100, backdropFilter:'blur(10px)', paddingBottom:'env(safe-area-inset-bottom)' }}>
        {tabs.map(({id,label,Icon,color})=>{
          const active = tab===id;
          return (
            <button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>setTab(id)} style={{ color:active?color:undefined }}>
              <Icon s={20}/><span>{label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
