  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0D0A1A;
      --surface: #161225;
      --card: #1C1730;
      --border: #2E2850;
      --gold: #C8A84B;
      --gold-dim: #8E7533;
      --gold-bright: #E2C87A;
      --text: #F2E8D0;
      --text-dim: #9E8F75;
      --text-muted: #6B5F4F;
      --terracotta: #B87A6A;
      --steel: #7A9EC8;
      --sage: #8AB87A;
      --green: #4A8C6F;
      --green-lt: #6ABF94;
      --red: #8B3030;
      --red-lt: #C25050;
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .playfair { font-family: 'Playfair Display', Georgia, serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Flip card */
    .flip-card { perspective: 1200px; }
    .flip-card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
      transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back {
      position: absolute; width: 100%; height: 100%;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      border-radius: 14px; overflow: hidden;
    }
    .flip-card-back { transform: rotateY(180deg); }

    /* Option buttons */
    .opt-btn {
      width: 100%; text-align: left;
      padding: 12px 14px; border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text);
      cursor: pointer; transition: all 0.15s;
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px; line-height: 1.45;
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--gold-dim); background: var(--card); }
    .opt-btn.sel    { border-color: var(--gold); background: rgba(200,168,75,0.1); }
    .opt-btn.ok     { border-color: var(--green-lt); background: rgba(74,140,111,0.16); color: #8FDFC0; }
    .opt-btn.bad    { border-color: var(--red-lt); background: rgba(139,48,48,0.16); color: #FF9090; }
    .opt-btn:disabled { cursor: default; }

    /* Nav */
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; padding: 8px 4px;
      border: none; background: transparent; cursor: pointer;
      transition: all 0.15s; color: var(--text-muted);
      font-family: 'Crimson Pro', serif; font-size: 10px;
      letter-spacing: 0.05em;
    }
    .nav-btn.active { color: var(--gold); }

    /* Progress ring */
    .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-fill  { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.7s ease; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.35s ease; }

    /* Decorative rule */
    .rule { height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim) 40%, var(--gold-dim) 60%, transparent); opacity: 0.4; }
  </style>
</head>

function ProgressBar({ pct, color }) {
  return (
    <div style={{ height:3, background:'#1E1C2E', borderRadius:2, overflow:'hidden', marginBottom:20 }}>
      <div style={{ height:'100%', background:`linear-gradient(90deg,${color},${color}cc)`, borderRadius:2, width:`${pct}%`, transition:'width 0.4s' }}/>
    </div>
  );
}

function Ring({ pct, size=64, label, color='#C8A84B' }) {
  const r = (size-8)/2;
  const circ = 2*Math.PI*r;
  const offset = circ*(1-pct/100);
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <svg width={size} height={size}>
        <circle className="ring-track" cx={size/2} cy={size/2} r={r}/>
        <circle className="ring-fill" cx={size/2} cy={size/2} r={r}
          style={{ stroke:color }}

          transform={`rotate(-90 ${size/2} ${size/2})`}/>
        <text x={size/2} y={size/2} dominantBaseline="middle" textAnchor="middle"
          fill={color} fontSize={size*0.21} fontFamily="JetBrains Mono" fontWeight="500">
          {Math.round(pct)}%

      </svg>
      {label && <span style={{ color:'#9E8F75', fontSize:10, fontFamily:'Crimson Pro', letterSpacing:'0.07em' }}>{label}</span>}

}

function calcPct(section) {
  if (!section) return 0;
  const c = section.correct?.length || 0;
  const w = section.wrong?.length || 0;
  return c+w > 0 ? Math.round(c/(c+w)*100) : 0;
}

/* ══════════════════════════ VOCAB DRILL ══════════════════════════ */

function VocabDrill({ progress, onProgress }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [mode, setMode] = useState('card');
  const [qIdx, setQIdx] = useState(0);
  const [quizOpts, setQuizOpts] = useState([]);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);

  const mastered = progress?.mastered || [];
  const word = VOCAB[idx];
  const isMastered = mastered.includes(word.word);

  useEffect(() => {
    if (mode !== 'quiz') return;
    const correct = VOCAB[qIdx].def;
    const others = VOCAB.filter((_,i)=>i!==qIdx).map(w=>w.def).sort(()=>Math.random()-0.5).slice(0,3);
    setQuizOpts([correct,...others].sort(()=>Math.random()-0.5));
    setSelected(null); setAnswered(false);
  }, [qIdx, mode]);

  const toggleMaster = () => {
    const nm = isMastered ? mastered.filter(w=>w!==word.word) : [...mastered, word.word];
    onProgress({ ...progress, mastered: nm });
  };

  const nav = (dir) => {
    if (mode==='card') { setIdx(i=>(i+dir+VOCAB.length)%VOCAB.length); setFlipped(false); }
    else setQIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);
  };

  const handleQuizSelect = opt => {
    if (answered) return;
    setSelected(opt); setAnswered(true);
    if (opt === VOCAB[qIdx].def) {
      const nm = mastered.includes(VOCAB[qIdx].word) ? mastered : [...mastered, VOCAB[qIdx].word];
      onProgress({ ...progress, mastered: nm });
    }
  };

  const current = mode==='card' ? idx : qIdx;

  return (
    <div>
      <SectionHeader color="#C8A84B" supra="Verbal Reasoning" title="Vocabulary" counter={`${current+1} / ${VOCAB.length}`}/>
      <div style={{ padding:'14px 14px 0' }}>
        {/* Mode toggle */}
        <div style={{ display:'flex', background:'#0D0A1A', borderRadius:8, padding:3, gap:3, marginBottom:14 }}>
          {['card','quiz'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setFlipped(false);}} style={{ flex:1, padding:'6px 0', borderRadius:6, border:'none', cursor:'pointer', background:mode===m?'#1C1730':'transparent', color:mode===m?'#C8A84B':'#6B5F4F', fontFamily:'Crimson Pro', fontSize:14, fontWeight:mode===m?600:400, transition:'all 0.18s', letterSpacing:'0.04em' }}>
              {m==='card'?'Flashcard':'Quiz Mode'}
            </button>
          ))}
        </div>

        {/* Mastery bar */}
        <div style={{ marginBottom:4 }}>
          <ProgressBar pct={mastered.length/VOCAB.length*100} color="#C8A84B"/>
        </div>
        <div style={{ color:'#6B5F4F', fontSize:11, fontFamily:'Crimson Pro', textAlign:'right', marginTop:-14, marginBottom:12 }}>
          {mastered.length} of {VOCAB.length} mastered
        </div>

        {mode==='card' ? (
          <>
            <div className={`flip-card${flipped?' flipped':''}`} style={{ height:290, cursor:'pointer', marginBottom:14 }} onClick={()=>setFlipped(f=>!f)}>
              <div className="flip-card-inner">
                {/* Front */}
                <div className="flip-card-front" style={{ background:'#1C1730', border:'1px solid #2E2850', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:28, textAlign:'center' }}>
                  <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:6 }}>{word.pos}</div>
                  <div className="playfair" style={{ fontSize:34, fontWeight:700, color:'#F2E8D0', lineHeight:1.1, marginBottom:10 }}>{word.word}</div>
                  <div className="rule" style={{ width:60, marginBottom:12 }}/>
                  <div style={{ color:'#C8A84B80', fontSize:12, fontFamily:'Crimson Pro', fontStyle:'italic', lineHeight:1.5 }}>{word.root}</div>
                  <div style={{ marginTop:22, color:'#4A3F30', fontSize:12, fontFamily:'Crimson Pro', letterSpacing:'0.08em' }}>tap to reveal →</div>
                </div>
                {/* Back */}
                <div className="flip-card-back" style={{ background:'#1A1330', border:'1px solid #C8A84B38', display:'flex', flexDirection:'column', justifyContent:'center', padding:20, gap:10 }}>
                  <div style={{ color:'#C8A84B', fontFamily:'Crimson Pro', fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase' }}>Definition</div>
                  <div style={{ color:'#F2E8D0', fontFamily:'Crimson Pro', fontSize:16, lineHeight:1.55 }}>{word.def}</div>
                  <div style={{ background:'rgba(0,0,0,0.3)', borderRadius:8, padding:10 }}>
                    <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:4, fontFamily:'Crimson Pro' }}>Example</div>
                    <div style={{ color:'#C8A84B', fontStyle:'italic', fontSize:14, lineHeight:1.5, fontFamily:'Crimson Pro' }}>{word.ex}</div>
                  </div>
                  <div style={{ color:'#9E8F75', fontSize:12.5, fontFamily:'Crimson Pro' }}>
                    <span style={{ color:'#4A3F30' }}>Synonyms: </span>{word.syns}
                  </div>
                </div>
              </div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>nav(-1)} style={{ width:44, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#9E8F75', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><ChevL s={18}/></button>
              <button onClick={toggleMaster} style={{ flex:1, height:44, borderRadius:8, cursor:'pointer', border:isMastered?'1px solid #C8A84B80':'1px solid #2E2850', background:isMastered?'rgba(200,168,75,0.13)':'#161225', color:isMastered?'#C8A84B':'#6B5F4F', fontFamily:'Crimson Pro', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', gap:6, transition:'all 0.18s' }}>

        ) : (
          <>

              <div style={{ color:'#C8A84B80', fontSize:12, fontFamily:'Crimson Pro', fontStyle:'italic' }}>{VOCAB[qIdx].root}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:14 }}>
              {quizOpts.map((opt,i)=>{
                const isRight = opt===VOCAB[qIdx].def;
                let cls='opt-btn';
                if(answered){ if(isRight) cls+=' ok'; else if(selected===opt) cls+=' bad'; }
                else if(selected===opt) cls+=' sel';
                return (
                  <button key={i} className={cls} disabled={answered} onClick={()=>handleQuizSelect(opt)}>
                    <span style={{ display:'inline-flex', gap:10, alignItems:'flex-start' }}>
                      <span style={{ fontFamily:'JetBrains Mono', fontSize:11, opacity:0.4, minWidth:16, paddingTop:1, flexShrink:0 }}>{String.fromCharCode(65+i)}</span>
                      <span>{opt}</span>
                    </span>
                  </button>
                );
              })}
            </div>
            {answered && (
              <div style={{ background:selected===VOCAB[qIdx].def?'rgba(74,140,111,0.12)':'rgba(139,48,48,0.12)', border:`1px solid ${selected===VOCAB[qIdx].def?'#4A8C6F':'#8B3030'}`, borderRadius:9, padding:13, marginBottom:14 }}>
                <div style={{ color:selected===VOCAB[qIdx].def?'#6ABF94':'#C25050', fontWeight:600, fontFamily:'Crimson Pro', fontSize:14, marginBottom:4 }}>

                <div style={{ color:'#9E8F75', fontSize:14, lineHeight:1.55, fontFamily:'Crimson Pro' }}>
                  <span style={{ fontStyle:'italic', color:'#C8A84B' }}>{VOCAB[qIdx].word}</span>: {VOCAB[qIdx].def}
                </div>
                <div style={{ color:'#6B5F4F', fontSize:13, marginTop:5, fontStyle:'italic', fontFamily:'Crimson Pro' }}>{VOCAB[qIdx].ex}</div>
              </div>
            )}
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>nav(-1)} style={{ width:44, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#9E8F75', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><ChevL s={18}/></button>
              <button onClick={()=>nav(1)} style={{ flex:1, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#C8A84B', cursor:'pointer', fontFamily:'Crimson Pro', fontSize:15, display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>
                Next Word <ChevR s={16}/>
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════ GRAMMAR DRILL ══════════════════════════ */

function GrammarDrill({ progress, onProgress }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [done, setDone] = useState(false);

  const correct = progress?.correct || [];
  const wrong   = progress?.wrong   || [];
  const q = GRAMMAR[idx];

  const handleSelect = i => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    const ok = i===q.ans;
    if (ok  && !correct.includes(q.id)) onProgress({ ...progress, correct:[...correct,q.id], wrong:wrong.filter(w=>w!==q.id) });
    if (!ok && !wrong.includes(q.id))   onProgress({ ...progress, wrong:[...wrong,q.id], correct:correct.filter(c=>c!==q.id) });
  };

  const next = () => {
    if (idx < GRAMMAR.length-1) { setIdx(i=>i+1); setSelected(null); setAnswered(false); }
    else setDone(true);
  };

  if (done) return (
    <>
      <SectionHeader color="#B87A6A" supra="Grammar & Usage" title="Sentence Mechanics"/>
      <ResultCard correct={correct.length} total={GRAMMAR.length} color="#B87A6A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/>
    </>
  );

  return (
    <div>
      <SectionHeader color="#B87A6A" supra="Grammar & Usage" title="Sentence Mechanics" counter={`${idx+1}/${GRAMMAR.length}`}/>
      <div style={{ padding:'14px' }}>
        <ProgressBar pct={(idx/GRAMMAR.length)*100} color="#B87A6A"/>
        <QuestionCard prompt={q.q} opts={q.opts} ans={q.ans} answered={answered} selected={selected} onSelect={handleSelect} color="#B87A6A" hint={`Question ${idx+1}`}/>
        {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
        {answered && <NextButton onClick={next} label={idx<GRAMMAR.length-1?'Next Question':'See Results'} color="#B87A6A"/>}
      </div>
    </div>
  );
}

/* ══════════════════════════ READING DRILL ══════════════════════════ */

function ReadingDrill({ progress, onProgress }) {
  const [pIdx, setPIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [view, setView] = useState('passage');

  const correct = progress?.correct || [];
  const wrong   = progress?.wrong   || [];
  const passage = PASSAGES[pIdx];
  const q = passage.qs[qIdx];

  const handleSelect = i => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    const ok = i===q.ans;
    if (ok  && !correct.includes(q.id)) onProgress({ ...progress, correct:[...correct,q.id], wrong:wrong.filter(w=>w!==q.id) });
    if (!ok && !wrong.includes(q.id))   onProgress({ ...progress, wrong:[...wrong,q.id], correct:correct.filter(c=>c!==q.id) });
  };

  const nextQ = () => {
    if (qIdx < passage.qs.length-1) { setQIdx(i=>i+1); setSelected(null); setAnswered(false); }
    else {
      setPIdx(i=>(i+1)%PASSAGES.length);
      setQIdx(0); setSelected(null); setAnswered(false); setView('passage');
    }
  };

  return (
    <div>
      <div style={{ background:'#161225', padding:'20px 16px 16px', borderBottom:'1px solid #2E2850' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div>
            <div style={{ color:'#7A9EC8', fontSize:10, letterSpacing:'0.28em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:2 }}>Reading Comprehension</div>
            <h2 className="playfair" style={{ fontSize:20, color:'#F2E8D0', margin:0 }}>Classical Passages</h2>
          </div>
          <div style={{ color:'#9E8F75', fontSize:13, fontFamily:'JetBrains Mono' }}>P{pIdx+1}·Q{qIdx+1}/{passage.qs.length}</div>
        </div>
        <div style={{ display:'flex', background:'#0D0A1A', borderRadius:8, padding:3, gap:3 }}>
          {['passage','questions'].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{ flex:1, padding:'6px 0', borderRadius:6, border:'none', cursor:'pointer', background:view===v?'#1C1730':'transparent', color:view===v?'#7A9EC8':'#6B5F4F', fontFamily:'Crimson Pro', fontSize:14, fontWeight:view===v?600:400, transition:'all 0.18s', textTransform:'capitalize', letterSpacing:'0.03em' }}>
              {v}
            </button>
          ))}
        </div>
      </div>

      {view==='passage' ? (
        <div style={{ padding:'14px' }}>
          <div style={{ marginBottom:14 }}>
            <div className="playfair" style={{ fontSize:19, fontWeight:600, color:'#F2E8D0', marginBottom:4 }}>{passage.title}</div>
            <div style={{ color:'#6B5F4F', fontSize:11, fontFamily:'Crimson Pro', fontStyle:'italic' }}>{passage.source}</div>
          </div>
          <div style={{ background:'#161225', border:'1px solid #2E2850', borderRadius:12, padding:20, color:'#D8CEBC', fontFamily:'Crimson Pro', fontSize:16, lineHeight:1.8, marginBottom:14 }}>
            {passage.text.split('\n\n').map((p,i)=><p key={i} style={{ margin:i>0?'16px 0 0':0 }}>{p}</p>)}
          </div>
          <button onClick={()=>setView('questions')} style={{ width:'100%', height:46, borderRadius:8, border:'1px solid #7A9EC860', background:'rgba(122,158,200,0.12)', color:'#7A9EC8', cursor:'pointer', fontFamily:'Crimson Pro', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
            Answer Questions <ChevR s={16}/>
          </button>
        </div>
      ) : (
        <div style={{ padding:'14px' }}>
          <ProgressBar pct={(qIdx/passage.qs.length)*100} color="#7A9EC8"/>
          <QuestionCard prompt={q.q} opts={q.opts} ans={q.ans} answered={answered} selected={selected} onSelect={handleSelect} color="#7A9EC8" hint={`Question ${qIdx+1} of ${passage.qs.length}`}/>
          {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={()=>setView('passage')} style={{ flex:1, height:44, borderRadius:8, border:'1px solid #2E2850', background:'#161225', color:'#7A9EC8', cursor:'pointer', fontFamily:'Crimson Pro', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', gap:4 }}>
              <ChevL s={14}/> Re-read
            </button>
            {answered && (
              <button onClick={nextQ} style={{ flex:2, height:44, borderRadius:8, border:'1px solid #7A9EC860', background:'rgba(122,158,200,0.12)', color:'#7A9EC8', cursor:'pointer', fontFamily:'Crimson Pro', fontSize:15, display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>
                {qIdx<passage.qs.length-1?'Next Question':'Next Passage'} <ChevR s={16}/>
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════ MATH DRILL ══════════════════════════ */

function MathDrill({ progress, onProgress }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [done, setDone] = useState(false);

  const correct = progress?.correct || [];
  const wrong   = progress?.wrong   || [];
  const q = MATH[idx];

  const handleSelect = i => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    const ok = i===q.ans;
    if (ok  && !correct.includes(q.id)) onProgress({ ...progress, correct:[...correct,q.id], wrong:wrong.filter(w=>w!==q.id) });
    if (!ok && !wrong.includes(q.id))   onProgress({ ...progress, wrong:[...wrong,q.id], correct:correct.filter(c=>c!==q.id) });
  };

  const next = () => {
    if (idx < MATH.length-1) { setIdx(i=>i+1); setSelected(null); setAnswered(false); }
    else setDone(true);
  };

  if (done) return (
    <>
      <SectionHeader color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice"/>
      <ResultCard correct={correct.length} total={MATH.length} color="#8AB87A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/>
    </>
  );

  return (
    <div>
      <SectionHeader color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice" counter={`${idx+1}/${MATH.length}`}/>
      <div style={{ padding:'14px' }}>
        <ProgressBar pct={(idx/MATH.length)*100} color="#8AB87A"/>

        {/* Question box — monospace for math */}
        <div style={{ background:'#1C1730', border:'1px solid #2E2850', borderRadius:12, padding:20, marginBottom:14 }}>
          <div style={{ color:'#6B5F4F', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:'Crimson Pro', marginBottom:10 }}>Problem {idx+1}</div>
          <div style={{ color:'#F2E8D0', fontSize:17, lineHeight:1.55, fontFamily:'Crimson Pro', fontWeight:500 }}>{q.q}</div>
        </div>

        {/* 2-column grid for answers */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:14 }}>
          {q.opts.map((opt,i)=>{
            let cls='opt-btn';
            if(answered){ if(i===q.ans) cls+=' ok'; else if(selected===i) cls+=' bad'; }
            else if(selected===i) cls+=' sel';
            return (
              <button key={i} className={cls} disabled={answered} onClick={()=>handleSelect(i)} style={{ textAlign:'center', padding:'14px 8px' }}>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:10, opacity:0.38 }}>{String.fromCharCode(65+i)}</span>
                  <span style={{ fontFamily:'JetBrains Mono', fontSize:20, fontWeight:500 }}>{opt}</span>
                </div>
              </button>
            );
          })}
        </div>

        {answered && <ExplanationBox correct={selected===q.ans} text={q.exp}/>}
        {answered && <NextButton onClick={next} label={idx<MATH.length-1?'Next Problem':'See Results'} color="#8AB87A"/>}
      </div>
    </div>
  );
}

/* ══════════════════════════ APP ══════════════════════════ */

function App() {
  const [tab, setTab] = useState('home');
  const [progress, setProgress] = useState(()=>{
    const s = gs('progress');
    return s || { vocab:{mastered:[],seen:[]}, grammar:{correct:[],wrong:[]}, reading:{correct:[],wrong:[]}, math:{correct:[],wrong:[]} };
  });

  const save = (key, val) => {
    const np = { ...progress, [key]:val };
    setProgress(np); ss('progress', np);
  };

  const tabs = [
    { id:'home',    label:'Home',    Icon:HomeIcon,   color:'#C8A84B' },
    { id:'verbal',  label:'Verbal',  Icon:BookIcon,   color:'#C8A84B' },
    { id:'grammar', label:'Grammar', Icon:PenIcon,    color:'#B87A6A' },
    { id:'reading', label:'Reading', Icon:ScrollIcon, color:'#7A9EC8' },
    { id:'math',    label:'Math',    Icon:SigmaIcon,  color:'#8AB87A' },
  ];

  return (
    <div style={{ background:'#0D0A1A', minHeight:'100vh', fontFamily:"'Crimson Pro',Georgia,serif" }}>
      <main style={{ paddingBottom:72, minHeight:'100vh' }}>
        <div className="fade-up" key={tab}>
          {tab==='home'    && <HomeScreen progress={progress} onTab={setTab}/>}
          {tab==='verbal'  && <VocabDrill   progress={progress.vocab}   onProgress={v=>save('vocab',v)}/>}
          {tab==='grammar' && <GrammarDrill progress={progress.grammar} onProgress={v=>save('grammar',v)}/>}
          {tab==='reading' && <ReadingDrill progress={progress.reading} onProgress={v=>save('reading',v)}/>}
          {tab==='math'    && <MathDrill    progress={progress.math}    onProgress={v=>save('math',v)}/>}
        </div>
      </main>

      <nav style={{ position:'fixed', bottom:0, left:0, right:0, background:'rgba(13,10,26,0.97)', borderTop:'1px solid #2E2850', display:'flex', zIndex:100, backdropFilter:'blur(10px)', paddingBottom:'env(safe-area-inset-bottom)' }}>
        {tabs.map(({id,label,Icon,color})=>{
          const active = tab===id;
          return (
            <button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>setTab(id)} style={{ color:active?color:undefined }}>
              <Icon s={20}/><span>{label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
