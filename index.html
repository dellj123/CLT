  {word:'Anfractuous',  root:'L. anfractus (bending)',        def:'Winding; circuitous; full of twists.',                              ex:'The anfractuous path through the argument confused every reader.'},

const GRAMMAR=[
  {id:'g01',q:'Which sentence correctly uses the subjunctive mood?',
   opts:['If he was the president, policy would change overnight.','If he were the president, policy would change overnight.','If he is the president, policy would change overnight.','If he had been the president, policy would changed overnight.'],
   ans:1,exp:'The subjunctive is required in "if" clauses expressing conditions contrary to fact. "Were" is the correct subjunctive form for all subjects. "Was" signals the indicative mood, which describes real or likely situations, not hypotheticals.'},
  {id:'g02',q:'Choose the sentence that uses "who" or "whom" correctly.',
   opts:['Whom do you think will win the award?','Give the medal to whomever finishes first.','She is the attorney whom the court appointed.','Whom shall we say is responsible?'],
   ans:2,exp:'"Whom the court appointed" is correct — "whom" is the object of "appointed." In (A) the pronoun is subject of "will win," requiring "who." In (B) "whoever" is the subject of "finishes," so the nominative is needed. In (D) "who" is the subject of "is responsible."'},
  {id:'g03',q:'Which sentence correctly handles a collective noun in American English?',
   opts:['The jury have reached their verdict.','The jury has reached its verdict.','The jury have reached its verdict.','The jury has reached their verdict.'],
   ans:1,exp:'In American English, collective nouns (jury, team, committee) take singular verbs and singular pronouns when acting as a unified body: "has reached its verdict." British English permits the plural verb, but American usage treats the collective as singular.'},
  {id:'g04',q:'Identify the sentence with correct parallel structure using correlative conjunctions.',
   opts:['She is not only intelligent but has great creativity too.','Not only did she study hard, but she also practiced daily.','She is not only intelligent but also has great creativity.','She not only is intelligent but creative also.'],
   ans:1,exp:'"Not only...but also" must pair grammatically parallel elements. In (B), "did she study hard" parallels "she also practiced daily" — both are independent clauses. Option (A) pairs an adjective with a verb phrase. Option (C) pairs "is intelligent" with "has creativity" — two different verb types.'},
  {id:'g05',q:'Which sentence correctly uses "as" rather than "like" before a clause?',
   opts:['He ran the business like his father had before him.','He ran the business as his father had before him.','Nobody cooks like she does.','It tastes exactly like I remembered it would.'],
   ans:1,exp:'"As" is correct before a clause (subject + verb): "as his father had [before him]." "Like" is correct before a noun or pronoun without a verb. Options (A), (C), and (D) place "like" before a clause with a verb, which is informal but grammatically incorrect in formal writing.'},
  {id:'g06',q:'Which sentence correctly uses an absolute phrase?',
   opts:['The storm finished, we began to assess the damage.','The storm having finished, we began to assess the damage.','The storm was finished, we began to assess the damage.','Having finished the storm, we began to assess the damage.'],
   ans:1,exp:'An absolute phrase (noun + participle) modifies the entire main clause and is set off by a comma without a conjunction: "The storm having finished." Options (A) and (C) are comma splices. Option (D) creates a dangling modifier — "we" did not finish the storm.'},
  {id:'g07',q:'Which sentence correctly uses an adjective after a linking verb?',
   opts:['The bread tastes freshly out of the oven.','She feels badly about the mistake she made.','The music sounded beautifully throughout the hall.','The roses in the garden smell sweet.'],
   ans:3,exp:'Linking verbs (taste, feel, sound, smell, seem, appear) take predicate adjectives: "smell sweet." "Freshly," "badly," and "beautifully" are adverbs and cannot describe the subject\'s quality. "Feels bad" is correct for emotional states; "feels badly" would mean a defective sense of touch.'},
  {id:'g08',q:'Which sentence correctly uses the past perfect tense?',
   opts:['By the time Maria arrived, everyone left already.','Everyone left before Maria had arrived already.','By the time Maria arrived, everyone had already left.','Maria arrived before everyone had already left.'],
   ans:2,exp:'The past perfect ("had left") marks an action completed before another past action ("arrived"). Option (C) correctly applies the past perfect to the earlier event. Option (A) uses simple past for both, losing the sense of sequence. Option (B) misapplies it to the later action.'},
  {id:'g09',q:'Which sentence uses "comprise" correctly?',
   opts:['The anthology is comprised of twenty-three poems.','The anthology comprises twenty-three poems.','Twenty-three poems comprise of the anthology.','The anthology is comprising twenty-three poems.'],
   ans:1,exp:'"Comprise" means "to include" or "to consist of" — the whole comprises its parts: "The anthology comprises poems." "Comprised of" (A) is widely used but technically incorrect; "composed of" is the correct alternative. "Comprise of" (C) is never correct.'},
  {id:'g10',q:'Which sentence uses "lay" or "lie" correctly?',
   opts:['She laid down for a nap after reading.','He lay the documents carefully on the table.','The cat has lain in the same spot all morning.','Please lie the books on the shelf for me.'],
   ans:2,exp:'"Lie" (to recline) is intransitive: lie→lay→lain. "Lay" (to place) is transitive: lay→laid→laid. (A) "laid down" should be "lay down" (past of intransitive lie). (B) "lay the documents" should be "laid" (past of transitive lay). (D) "lie the books" should be "lay the books." (C) "has lain" — correct past participle of intransitive lie.'},
  {id:'g11',q:'Which sentence is correctly punctuated as an indirect question?',
   opts:['She asked whether the letter had arrived?','She asked, "Whether the letter had arrived."','She asked whether the letter had arrived.','She asked — "whether the letter had arrived?"'],
   ans:2,exp:'An indirect question reports speech as a declarative statement and ends with a period, not a question mark. The question mark is reserved for direct questions in quotation marks: She asked, "Has the letter arrived?"'},
  {id:'g12',q:'Which sentence contains an error in the use of "affect" or "effect"?',
   opts:['The medication had no noticeable effect on her symptoms.','Cold weather can affect your mood significantly.','The committee voted to effect sweeping changes in policy.','His poor diet began to effect his athletic performance.'],
   ans:3,exp:'Option (D) misuses "effect" where "affect" (verb, to influence) is needed. "Effect" as a verb means "to bring about" — as in "effect a change." Options (A–C) are all correct: "effect" as noun, "affect" as verb, and "effect" as a verb meaning "to produce/achieve."'},
  {id:'g13',q:'Which sentence is correct regarding "who" versus "that" for people?',
   opts:['The student that scored highest received the medal.','The students who studied hardest succeeded.','The doctor who treated him was highly experienced.','Both B and C are correct.'],
   ans:3,exp:'In formal writing, "who" is the preferred relative pronoun for people, not "that." Both (B) and (C) correctly use "who" for human antecedents. Option (A) uses "that" for a person, which is considered informal or incorrect in formal and literary contexts.'},
  {id:'g14',q:'Which sentence incorrectly uses a hyphen with a compound modifier?',
   opts:['He delivered a well-prepared argument to the court.','She is a highly-skilled surgeon with decades of experience.','They signed a twenty-year lease on the building.','The well-planned event proceeded without any problems.'],
   ans:1,exp:'Do not hyphenate compound modifiers beginning with an adverb ending in -ly: "highly skilled surgeon" (no hyphen). The -ly signals an adverb, making the relationship clear without a hyphen. Contrast: "well-prepared" requires a hyphen because "well" can be an adjective or adverb, creating potential ambiguity.'},
  {id:'g15',q:'Which sentence has a clear, unambiguous pronoun reference?',
   opts:['When Maria called Julia, she sounded upset.','After the students read the essays, they revised them.','The president told the senator that he had made an error.','The boy kicked the ball against the wall until it cracked.'],
   ans:3,exp:'In (D), "it" unambiguously refers to "the wall" — balls do not typically crack against walls. Options (A), (B), and (C) each contain a pronoun that could refer to either of two nouns, creating dangerous ambiguity about who or what is meant.'},
];

const PASSAGES=[
  {id:'p01',title:'Edmund Burke, Reflections on the Revolution in France (1790)',
   text:`From Magna Carta to the Declaration of Right, it has been the uniform policy of our constitution to claim and assert our liberties as an entailed inheritance derived to us from our forefathers, and to be transmitted to our posterity as an estate specially belonging to the people of this kingdom, without any reference whatever to any more general or prior right.

By a constitutional policy, working after the pattern of nature, we receive, we hold, we transmit our government and our privileges in the same manner in which we enjoy and transmit our property and our lives. The institutions of policy, the goods of fortune, the gifts of providence are handed down to us, and from us, in the same course and order.`,
   qs:[
     {q:'Burke compares English liberties to:',
      opts:['A revolutionary decree issued by the people','An inherited family estate passed through generations','A democratic contract renewed by each generation','A gift from foreign nations'],
      ans:1,exp:'Burke repeatedly uses the language of inheritance and estate — "entailed inheritance," "transmitted to our posterity," "estate specially belonging" — to argue that liberty is held like property, passed from generation to generation rather than newly invented.'},
     {q:'The word "entailed" in Burke\'s usage most nearly means:',
      opts:['Described in extensive detail','Restricted in inheritance to a specific line of heirs','Earned through political struggle','Granted by royal decree alone'],
      ans:1,exp:'An "entail" in property law restricts an estate so it passes down a specific family line and cannot be sold. Burke uses this legal term to argue that liberty is similarly inalienable, heritable, and not subject to the whims of any single generation.'},
     {q:'Burke\'s argument implies that liberty is best preserved by:',
      opts:['Constant reform and revision in each generation','Revolutionary overthrow of corrupt institutions','Continuity with historical precedent and inheritance','Universal abstract declarations of natural rights'],
      ans:2,exp:'Burke\'s central theme is that English freedoms derive their strength from being handed down through history, not invented from abstract principles. Continuity and inheritance — not revolution — are his prescription for preserving liberty.'},
   ]},
  {id:'p02',title:'John Milton, Areopagitica (1644)',
   text:`And though all the winds of doctrine were let loose to play upon the earth, so Truth be in the field, we do injuriously, by licensing and prohibiting, to misdoubt her strength. Let her and Falsehood grapple; who ever knew Truth put to the worse, in a free and open encounter? Her confuting is the best and surest suppressing.

For who knows not that Truth is strong, next to the Almighty? She needs no policies, nor stratagems, nor licensings to make her victorious; those are the shifts and the defences that Error uses against her power. Give her but room, and do not bind her when she sleeps.`,
   qs:[
     {q:'Milton\'s central argument is that Truth:',
      opts:['Must be protected from falsehood by government licensing','Will prevail over falsehood if given freedom to compete openly','Is too fragile to survive unrestricted public debate','Requires the active suppression of dissenting opinion'],
      ans:1,exp:'Milton argues that Truth does not need censorship ("licensing and prohibiting") to survive. In free and open encounter with falsehood, Truth will always win. Censorship therefore insults Truth by implying she cannot defend herself without help.'},
     {q:'The phrase "let her and Falsehood grapple" personifies Truth and Falsehood as:',
      opts:['Biblical figures from scripture','Political candidates in an election','Opponents in a physical contest or wrestling match','Scientific hypotheses under laboratory examination'],
      ans:2,exp:'"Grapple" is a wrestling term. Milton personifies Truth and Falsehood as combatants to argue that the competition of ideas should be fought openly. Truth, he implies, always wins in a fair fight — so censorship only helps Error, not Truth.'},
     {q:'Milton identifies "policies," "stratagems," and "licensings" as tools used by:',
      opts:['Truth, to protect herself from Falsehood','Falsehood and Error, in their fight against Truth','The government, for the legitimate protection of citizens','Scholars, to advance legitimate knowledge'],
      ans:1,exp:'Milton writes these are "the shifts and the defences that Error uses against her power." This is a powerful rhetorical reversal: censorship, presented as protecting truth, is actually the weapon of falsehood. Truth needs none of it.'},
   ]},
  {id:'p03',title:'Alexis de Tocqueville, Democracy in America (1840)',
   text:`When the inhabitant of a democratic country compares himself individually with all those about him, he feels with pride that he is the equal of any of them; but when he comes to survey the totality of his fellows and to place himself in contrast with so huge a body, he is instantly overwhelmed by the sense of his own insignificance and weakness.

The same equality that renders him independent of each of his fellow-citizens taken severally, exposes him alone and unprotected to the influence of the greater number. The public, therefore, among a democratic people, has a singular power: it does not persuade men to its beliefs, but it imposes them and makes them permeate the thinking of everyone by a kind of enormous pressure of the mind of all upon the intelligence of each.`,
   qs:[
     {q:'Tocqueville describes a paradox in which democratic equality makes the individual feel:',
      opts:['Powerful against the collective, but weak against each person','Equal to each person, yet insignificant and overwhelmed before the mass','Uniformly powerful in all social and political contexts','Protected from tyranny by the support of the majority'],
      ans:1,exp:'Tocqueville\'s paradox: equality with each individual produces pride, but the sheer size of the collective produces crushing insignificance. The same equality that liberates the individual from each neighbor exposes him to the overwhelming force of all neighbors combined.'},
     {q:'The word "severally" as used here most nearly means:',
      opts:['Harshly or with great severity','Individually; one by one; separately','As a group; collectively','In enormous or uncountable numbers'],
      ans:1,exp:'"Severally" is a legal and formal term meaning "separately" or "individually." "Independent of each fellow-citizen taken severally" means independent of each one considered alone — which paradoxically leaves him defenseless against all of them acting together.'},
     {q:'According to Tocqueville, the public\'s power in a democracy is most accurately described as:',
      opts:['Violent and ultimately revolutionary in nature','Formally imposed through law and government decree','A psychological pressure that permeates thought without argument','Dependent primarily on the control of economic resources'],
      ans:2,exp:'Tocqueville distinguishes persuasion from imposition. Democratic public opinion does not argue its way into the individual mind — it overwhelms through sheer collective pressure: "enormous pressure of the mind of all upon the intelligence of each." This is his famous theory of the tyranny of the majority.'},
   ]},
  {id:'p04',title:'Francis Bacon, Of Truth (1625)',
   text:`What is Truth? said jesting Pilate; and would not stay for an answer. Certainly there be that delight in giddiness, and count it a bondage to fix a belief; affecting free-thinking as a humor; not caring for good-will, but only for the ease of spirit that comes from license.

But it is not only the difficulty and labor which men take in finding out of truth; nor again that, when it is found, it imposeth upon men's thoughts; that doth bring lies in favor. But a natural though corrupt love of the lie itself. One of the later school of the Grecians examineth the matter, and is at a stand to think what should be in it, that men should love lies; where neither they make for pleasure, as with poets, nor for advantage, as with the merchant; but for the lie's sake.`,
   qs:[
     {q:'The allusion to "jesting Pilate" characterizes some people\'s approach to truth as:',
      opts:['Earnest and philosophically rigorous','Frivolous, dismissive, and unwilling to seek an answer','Scientifically careful but ultimately mistaken','Politically calculated and self-serving'],
      ans:1,exp:'Pilate\'s question "What is truth?" is delivered as a jest — he asks but will not wait for an answer. Bacon uses this to identify a class of people who treat the question of truth as a game rather than a serious inquiry, delighting in the instability of never committing to a belief.'},
     {q:'The word "affecting" as used in the passage most nearly means:',
      opts:['Being genuinely and emotionally moved by something','Pretending to have; adopting artificially as a fashionable pose','Having a real influence or effect upon something','Feeling strong dislike or opposition toward something'],
      ans:1,exp:'"Affecting free-thinking as a humor" means pretending to be a free-thinker as a fashionable affectation — not out of genuine philosophical commitment. This is the older meaning of "affect": to assume or feign a quality one does not actually possess.'},
     {q:'Bacon argues that the deepest reason men prefer lies is:',
      opts:['The difficulty of locating and identifying truth','The burden that truth imposes upon thought and conscience','A natural, corrupt love of falsehood for its own sake','The practical advantage that lies provide in commerce'],
      ans:2,exp:'Bacon builds his argument carefully: it is not merely that truth is hard to find, nor that it is burdensome — these would be excuses. The real culprit is deeper: "a natural though corrupt love of the lie itself," loving falsehood even when it brings no pleasure or practical benefit.'},
   ]},
];

  {id:'m14',q:'A jar has nickels and dimes totaling $1.75. There are 25 coins total. How many dimes?',
   opts:['8','9','10','12'],ans:2,
   exp:'n + d = 25 and 0.05n + 0.10d = 1.75. Substitute n = 25 − d: 1.25 + 0.05d = 1.75 → d = 10.'},
  {id:'m15',q:'For f(x) = x² − 4x + 3, what are the zeros (values where f(x) = 0)?',
   opts:['x = 1 and x = −3','x = −1 and x = 3','x = 1 and x = 3','x = −1 and x = −3'],ans:2,
   exp:'Factor: (x−1)(x−3) = 0 → x = 1 or x = 3. Verify: f(1) = 1−4+3 = 0 ✓. f(3) = 9−12+3 = 0 ✓.'},
];

/* ─── SHARED UI ─── */
function PBar({pct,color}){return<div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`,background:color}}/></div>;}
function Ring({pct,size=64,label,color}){
  const r=26,c=2*Math.PI*r,d=(pct/100)*c;
  return<div style={{textAlign:'center'}}>
    <svg width={size} height={size} viewBox="0 0 60 60" className="ring-svg">
      <circle cx="30" cy="30" r={r} fill="none" stroke="#2E2850" strokeWidth="5"/>
      <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
    </svg>
    <div style={{fontFamily:'Crimson Pro',fontSize:11,color:'#6B5F4F',marginTop:2}}>{label}</div>
    <div style={{fontFamily:'JetBrains Mono',fontSize:11,color,marginTop:1}}>{pct}%</div>
  </div>;
}
function SecHead({color,supra,title,counter}){return<div style={{background:'linear-gradient(170deg,#1A1230 0%,#0D0A1A 100%)',padding:'32px 18px 22px',borderBottom:'1px solid #2E2850',position:'relative',overflow:'hidden'}}>
  <div style={{position:'absolute',top:-40,right:-40,width:140,height:140,borderRadius:'50%',background:`radial-gradient(circle,${color}10 0%,transparent 70%)`,pointerEvents:'none'}}/>
  <div style={{color,fontSize:10,letterSpacing:'0.3em',fontFamily:'Crimson Pro',textTransform:'uppercase',marginBottom:6,opacity:0.8}}>{supra}</div>

    <h2 className="playfair" style={{fontSize:26,fontWeight:700,color:'#F2E8D0',margin:0}}>{title}</h2>
    {counter&&<div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#4A3F6B'}}>{counter}</div>}
  </div>
</div>;}
function ExpBox({correct,text}){return<div style={{background:correct?'rgba(74,140,111,0.10)':'rgba(139,48,48,0.10)',border:`1px solid ${correct?'#4A8C6F':'#8B3030'}`,borderRadius:9,padding:'12px 14px',marginBottom:14}}>
  <div style={{color:correct?'#6ABF94':'#C25050',fontWeight:600,fontFamily:'Crimson Pro',fontSize:14,marginBottom:4}}>{correct?'✓ Correct':'✗ Not quite'}</div>
  <div style={{color:'#9E8F75',fontSize:14,lineHeight:1.6,fontFamily:'Crimson Pro'}}>{text}</div>
</div>;}
function ResCard({correct,total,color,onReset}){
  const pct=Math.round((correct/total)*100);
  const msg=pct>=90?'Masterful.':pct>=75?'Strong work.':pct>=60?'Solid progress.':'Keep at it.';
  return<div style={{padding:20,textAlign:'center'}}>
    <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'28px 20px'}}>
      <Ring pct={pct} size={90} label="Score" color={color}/>
      <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0',marginTop:16}}>{correct} / {total}</div>
      <div style={{fontFamily:'Crimson Pro',fontStyle:'italic',color:'#9E8F75',marginTop:6,fontSize:16}}>{msg}</div>
      <button onClick={onReset} style={{marginTop:20,background:color+'22',border:`1px solid ${color}44`,borderRadius:8,color,fontFamily:'Crimson Pro',fontSize:15,padding:'10px 28px',cursor:'pointer'}}>Try Again</button>
    </div>
  </div>;
}
function NxtBtn({onClick,label,color}){return<button onClick={onClick} style={{width:'100%',height:46,borderRadius:9,border:`1px solid ${color}44`,background:color+'18',color,fontFamily:'Crimson Pro',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{label}<ChevR s={16}/></button>;}

/* ─── VOCAB ─── */
function VocabDrill({progress,onProgress}){
  const [mode,setMode]=useState('card');
  const [idx,setIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const mastered=progress?.mastered||[];
  const word=VOCAB[idx];
  const toggleMaster=()=>{
    const nm=mastered.includes(word.word)?mastered.filter(w=>w!==word.word):[...mastered,word.word];
    onProgress({...progress,mastered:nm});
  };
  const nav=dir=>{
    if(mode==='card'){setIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);setFlipped(false);setAnimKey(k=>k+1);}
    else{setQIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);setSelected(null);setAnswered(false);}
  };
  const qw=VOCAB[qIdx];
  const qopts=(()=>{const c=qw.def,o=VOCAB.filter(v=>v.word!==qw.word).map(v=>v.def).sort(()=>Math.random()-0.5).slice(0,3);return[c,...o].sort(()=>Math.random()-0.5);})();
  const handleQ=opt=>{
    if(answered)return;setSelected(opt);setAnswered(true);
    if(opt===qw.def){const nm=mastered.includes(qw.word)?mastered:[...mastered,qw.word];onProgress({...progress,mastered:nm});}
  };
  const cur=mode==='card'?idx:qIdx;
  return<div>
    <SecHead color="#C8A84B" supra="Verbal Reasoning" title="Vocabulary" counter={`${cur+1} / ${VOCAB.length}`}/>
    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['card','quiz'].map(m=><button key={m} onClick={()=>{setMode(m);setFlipped(false);}} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:mode===m?'#1C1730':'transparent',color:mode===m?'#C8A84B':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:mode===m?600:400}}>{m==='card'?'Flashcard':'Quiz Mode'}</button>)}
      </div>
      <PBar pct={mastered.length/VOCAB.length*100} color="#C8A84B"/>
      <div style={{color:'#6B5F4F',fontSize:11,fontFamily:'Crimson Pro',textAlign:'right',marginTop:-10,marginBottom:12}}>{mastered.length} of {VOCAB.length} mastered</div>
      {mode==='card'?<>
        <div key={animKey} className="fade-up" onClick={()=>setFlipped(f=>!f)} style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'28px 20px',minHeight:200,cursor:'pointer',userSelect:'none',marginBottom:14,position:'relative',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{position:'absolute',top:12,right:14,fontFamily:'Crimson Pro',fontSize:11,color:'#4A3F6B'}}>tap to flip</div>
          {!flipped?<div style={{textAlign:'center'}}>
            <div className="playfair" style={{fontSize:28,fontWeight:700,color:'#F2E8D0',marginBottom:10}}>{word.word}</div>
            <div style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F',fontStyle:'italic'}}>{word.root}</div>
          </div>:<div className="fade-up">
            <div className="playfair" style={{fontSize:18,fontWeight:600,color:'#C8A84B',marginBottom:10}}>{word.word}</div>
            <div style={{fontFamily:'Crimson Pro',fontSize:16,color:'#F2E8D0',lineHeight:1.55,marginBottom:10}}>{word.def}</div>
            <div style={{fontFamily:'Crimson Pro',fontSize:14,color:'#9E8F75',fontStyle:'italic',lineHeight:1.5}}>"{word.ex}"</div>
          </div>}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={toggleMaster} style={{flex:1,height:44,borderRadius:8,border:`1px solid ${mastered.includes(word.word)?'#C8A84B44':'#2E2850'}`,background:mastered.includes(word.word)?'#C8A84B22':'#161225',color:mastered.includes(word.word)?'#C8A84B':'#9E8F75',fontFamily:'Crimson Pro',fontSize:14,cursor:'pointer'}}>{mastered.includes(word.word)?'★ Mastered':'☆ Mark mastered'}</button>
          <button onClick={()=>nav(1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevR s={18}/></button>
        </div>
      </>:<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Define the word</div>
          <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0'}}>{qw.word}</div>
          <div style={{fontFamily:'Crimson Pro',fontSize:12,color:'#6B5F4F',fontStyle:'italic',marginTop:4}}>{qw.root}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {qopts.map((opt,i)=>{let cls='opt-btn';if(answered){if(opt===qw.def)cls+=' ok';else if(opt===selected)cls+=' bad';}else if(opt===selected)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handleQ(opt)}>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===qw.def} text={`"${qw.word}" — ${qw.def}  ·  "${qw.ex}"`}/>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={()=>nav(1)} style={{flex:1,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',fontFamily:'Crimson Pro',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>Next Word<ChevR s={16}/></button>
        </div>
      </>}
    </div>
  </div>;
}

/* ─── GRAMMAR ─── */
function GrammarDrill({progress,onProgress}){
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [done,setDone]=useState(false);
  const correct=progress?.correct||[],wrong=progress?.wrong||[];
  const q=GRAMMAR[idx];
  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok&&!correct.includes(q.id))onProgress({...progress,correct:[...correct,q.id],wrong:wrong.filter(w=>w!==q.id)});
    if(!ok&&!wrong.includes(q.id))onProgress({...progress,wrong:[...wrong,q.id],correct:correct.filter(c=>c!==q.id)});
  };
  const next=()=>{if(idx<GRAMMAR.length-1){setIdx(i=>i+1);setSelected(null);setAnswered(false);}else setDone(true);};
  if(done)return<><SecHead color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice"/><ResCard correct={correct.length} total={GRAMMAR.length} color="#B87A6A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/></>;
  return<div>
    <SecHead color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice" counter={`${idx+1}/${GRAMMAR.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(idx/GRAMMAR.length)*100} color="#B87A6A"/>
      <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Question {idx+1}</div>
        <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.6,fontFamily:'Crimson Pro'}}>{q.q}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
        {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
      </div>
      {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
      {answered&&<NxtBtn onClick={next} label={idx<GRAMMAR.length-1?'Next Question':'See Results'} color="#B87A6A"/>}
    </div>
  </div>;
}

/* ─── READING ─── */
function ReadingDrill({progress,onProgress}){
  const [pIdx,setPIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [view,setView]=useState('passage');
  const correct=progress?.correct||[],wrong=progress?.wrong||[];
  const passage=PASSAGES[pIdx],q=passage.qs[qIdx],qId=`${pIdx}-${qIdx}`;
  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok&&!correct.includes(qId))onProgress({...progress,correct:[...correct,qId],wrong:wrong.filter(w=>w!==qId)});
    if(!ok&&!wrong.includes(qId))onProgress({...progress,wrong:[...wrong,qId],correct:correct.filter(c=>c!==qId)});
  };
  const next=()=>{
    if(qIdx<passage.qs.length-1){setQIdx(i=>i+1);setSelected(null);setAnswered(false);setView('question');}
    else if(pIdx<PASSAGES.length-1){setPIdx(i=>i+1);setQIdx(0);setSelected(null);setAnswered(false);setView('passage');}
  };
  const rTotal=PASSAGES.reduce((a,p)=>a+p.qs.length,0);
  const rDone=PASSAGES.slice(0,pIdx).reduce((a,p)=>a+p.qs.length,0)+qIdx;
  return<div>
    <SecHead color="#7A9EC8" supra="Reading Comprehension" title="Classical Passages" counter={`${pIdx+1}/${PASSAGES.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(rDone/rTotal)*100} color="#7A9EC8"/>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['passage','question'].map(v=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:view===v?'#1C1730':'transparent',color:view===v?'#7A9EC8':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:view===v?600:400}}>{v==='passage'?'Passage':'Question'}</button>)}
      </div>
      {view==='passage'?<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#7A9EC8',fontSize:12,fontFamily:'Crimson Pro',fontStyle:'italic',marginBottom:14,lineHeight:1.4}}>{passage.title}</div>
          {passage.text.split('\n\n').map((p,i)=><p key={i} style={{fontFamily:'Crimson Pro',fontSize:15,lineHeight:1.75,color:'#D4C8B0',margin:i===0?0:'14px 0 0'}}>{p.trim()}</p>)}
        </div>
        <NxtBtn onClick={()=>setView('question')} label="Go to Questions" color="#7A9EC8"/>
      </>:<>
        <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Question {qIdx+1} of {passage.qs.length}</div>
          <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.55,fontFamily:'Crimson Pro'}}>{q.q}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
        {answered&&(pIdx<PASSAGES.length-1||qIdx<passage.qs.length-1)&&<NxtBtn onClick={next} label={qIdx<passage.qs.length-1?'Next Question':'Next Passage'} color="#7A9EC8"/>}
      </>}
    </div>
  </div>;
}

/* ─── MATH ─── */
function MathDrill({progress,onProgress}){
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [done,setDone]=useState(false);
  const correct=progress?.correct||[],wrong=progress?.wrong||[];
  const q=MATH[idx];
  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok&&!correct.includes(q.id))onProgress({...progress,correct:[...correct,q.id],wrong:wrong.filter(w=>w!==q.id)});
    if(!ok&&!wrong.includes(q.id))onProgress({...progress,wrong:[...wrong,q.id],correct:correct.filter(c=>c!==q.id)});
  };
  const next=()=>{if(idx<MATH.length-1){setIdx(i=>i+1);setSelected(null);setAnswered(false);}else setDone(true);};
  if(done)return<><SecHead color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice"/><ResCard correct={correct.length} total={MATH.length} color="#8AB87A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/></>;
  return<div>
    <SecHead color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice" counter={`${idx+1}/${MATH.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(idx/MATH.length)*100} color="#8AB87A"/>
      <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Problem {idx+1}</div>
        <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.65,fontFamily:'Crimson Pro',whiteSpace:'pre-line'}}>{q.q}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
        {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)} style={{textAlign:'center',padding:'14px 8px'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontFamily:'JetBrains Mono',fontSize:10,opacity:0.38}}>{String.fromCharCode(65+i)}</span><span style={{fontFamily:'JetBrains Mono',fontSize:17,fontWeight:500}}>{opt}</span></div></button>;})}
      </div>
      {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
      {answered&&<NxtBtn onClick={next} label={idx<MATH.length-1?'Next Problem':'See Results'} color="#8AB87A"/>}
    </div>
  </div>;
}

/* ─── APP ─── */
function App(){
  const [tab,setTab]=useState('home');
  const [progress,setProgress]=useState(()=>{const s=gs('progress');return s||{vocab:{mastered:[],seen:[]},grammar:{correct:[],wrong:[]},reading:{correct:[],wrong:[]},math:{correct:[],wrong:[]}};});
  const save=(key,val)=>{const np={...progress,[key]:val};setProgress(np);ss('progress',np);};
  const tabs=[
    {id:'home',   label:'Home',   Icon:HomeIcon, color:'#C8A84B'},
    {id:'verbal', label:'Verbal', Icon:BookIcon, color:'#C8A84B'},
    {id:'grammar',label:'Grammar',Icon:PenIcon,  color:'#B87A6A'},
    {id:'reading',label:'Reading',Icon:DocIcon,  color:'#7A9EC8'},
    {id:'math',   label:'Math',   Icon:SigmaIcon,color:'#8AB87A'},
  ];
  return<div style={{background:'#0D0A1A',minHeight:'100vh',fontFamily:"'Crimson Pro',Georgia,serif"}}>
    <main style={{paddingBottom:72,minHeight:'100vh'}}>
      <div className="fade-up" key={tab}>
        {tab==='home'   &&<HomeScreen  progress={progress} onTab={setTab}/>}
        {tab==='verbal' &&<VocabDrill  progress={progress.vocab}   onProgress={v=>save('vocab',v)}/>}
        {tab==='grammar'&&<GrammarDrill progress={progress.grammar} onProgress={v=>save('grammar',v)}/>}
        {tab==='reading'&&<ReadingDrill progress={progress.reading} onProgress={v=>save('reading',v)}/>}
        {tab==='math'   &&<MathDrill   progress={progress.math}    onProgress={v=>save('math',v)}/>}
      </div>
    </main>
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(13,10,26,0.97)',borderTop:'1px solid #2E2850',display:'flex',zIndex:100,backdropFilter:'blur(10px)',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label,Icon,color})=>{const active=tab===id;return<button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>setTab(id)} style={{color:active?color:undefined}}><Icon s={20}/><span>{label}</span></button>;})}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
