const GRAMMAR_POOL = [
  {id:'g01',q:'Choose the sentence with correct subject-verb agreement.',
   opts:['Each of the players have their own locker.','Each of the players has his own locker.','Each of the players have his own locker.','Each of the players has their own lockers.'],
   ans:1,exp:'"Each" is always singular and takes a singular verb: "has." Use singular pronouns (his/her) to match.'},
  {id:'g02',q:'Which sentence uses a comma correctly before a coordinating conjunction?',
   opts:['She studied hard, but she still felt nervous.','She studied hard but, she still felt nervous.','She studied, hard but she still felt nervous.','She studied hard but she, still felt nervous.'],
   ans:0,exp:'Use a comma before a coordinating conjunction (but, and, or, so…) when it joins two complete sentences. Both parts here are independent clauses, so the comma before "but" is correct.'},
  {id:'g03',q:'Which sentence avoids a dangling modifier?',
   opts:['Finishing the race, the trophy was handed to her.','Finishing the race, she was handed the trophy.','The trophy was handed to her, finishing the race.','Having finished the race, the trophy gleamed.'],
   ans:1,exp:'A participial phrase must modify the sentence\'s subject. In (B), "she" is the one who finished the race — the phrase correctly modifies her. In the others, the trophy is falsely implied to be the one finishing.'},
  {id:'g04',q:'Which sentence uses the correct pronoun case?',
   opts:['The coach praised both Marcus and I.','The coach praised both Marcus and me.','The coach praised both he and I.','The coach praised both him and I.'],

  {id:'g05',q:'Select the correctly punctuated sentence.',

  {id:'g06',q:'Which option corrects the faulty parallelism?',

  {id:'g07',q:'Choose the sentence that uses a semicolon correctly.',
   opts:['I was tired; but I kept working.','I was tired; however, I kept working.','I was tired; and I kept working.','I was tired, however; I kept working.'],

  {id:'g09',q:'Which sentence uses an apostrophe correctly?',

   ans:1,exp:'"Dog\'s" shows one dog owns the collar. Apostrophe before the s = singular possessive. "Dogs\'" would mean multiple dogs sharing one collar.'},
  {id:'g10',q:'Which sentence avoids a run-on error?',
   opts:['The sun set, it grew cold quickly.','The sun set it grew cold quickly.','The sun set. It grew cold quickly.','The sun set and, it grew cold quickly.'],
   ans:2,exp:'Two independent clauses cannot be joined with just a comma (comma splice) or no punctuation (fused sentence). Separating them with a period is the cleanest solution.'},

  {id:'g17',q:'Which sentence correctly uses a colon?',
   opts:['She bought: apples, oranges, and pears.','The rule is simple: never give up.','He remembered: that the test was tomorrow.','My favorites are: math and history.'],
   ans:1,exp:'A colon must follow a complete independent clause. "The rule is simple" is a complete sentence; the colon then introduces what follows. Do not use a colon directly after a verb like "are" or "bought."'},
  {id:'g18',q:'Identify the sentence that uses a comparative adjective correctly.',

  {id:'g20',q:'Which sentence avoids a misplaced modifier?',

   ans:1,exp:'The modifier "on paper plates" should be placed right next to what it modifies (sandwiches). In (A) it sounds like the guests are on paper plates. Placing it after "sandwiches" or at the start of the sentence makes the meaning clear.'},
  {id:'g21',q:'Choose the sentence that uses "who" correctly.',

   ans:1,exp:'"Who" is used as a subject. In (B) "who" is the subject of "won" — correct. In (C) "whom" is wrong because the pronoun is a subject. In (D) "whom" is needed because "did the coach select" has its own subject.'},
  {id:'g22',q:'Which sentence is correctly capitalized?',
   opts:['We studied the Civil war in History class.','We studied the civil war in history class.','We studied the Civil War in history class.','We studied the civil War in History class.'],
   ans:2,exp:'"Civil War" is a proper noun (the specific name of a historical conflict) and is always capitalized. "History class" is a general class name, not a proper noun, so it is not capitalized.'},
  {id:'g23',q:'Which sentence uses the past perfect tense correctly?',
   opts:['By the time she arrived, everyone left.','Everyone left before she arrived.','By the time she arrived, everyone had already left.','She arrived after everyone already left.'],
   ans:2,exp:'The past perfect ("had left") signals an action completed before another past action ("arrived"). Use it to show that one past event happened earlier than another past event.'},
  {id:'g24',q:'Which sentence has correct pronoun-antecedent agreement?',
   opts:['Every student must bring their textbook.','Every student must bring his or her textbook.','Every students must bring their textbooks.','Every student must bring our textbook.'],
   ans:1,exp:'"Every student" is singular, so it agrees with singular "his or her." (Using "their" for singular is increasingly accepted informally, but "his or her" is the traditionally correct formal choice.)'},
  {id:'g25',q:'Which sentence correctly uses a hyphen?',
   opts:['She is a well known author in her field.','She is a well-known author in her field.','She is a well known-author in her field.','She is a well-known-author in her field.'],
   ans:1,exp:'Compound modifiers before a noun are hyphenated: "well-known author." When the modifier comes after the noun, no hyphen is needed: "The author is well known."'},
  {id:'g26',q:'Choose the sentence that avoids a double negative.',

   ans:2,exp:'Double negatives are grammatically incorrect in standard English. "Didn\'t find any" uses a single negative correctly. "Didn\'t say nothing," "couldn\'t hardly," and "don\'t have no" all create unintended double negatives.'},
  {id:'g27',q:'Which sentence correctly uses an introductory prepositional phrase?',
   opts:['After the game the team went out for pizza.','After the game, the team went out for pizza.','After the game the team, went out for pizza.','After the game the team went, out for pizza.'],
   ans:1,exp:'An introductory prepositional phrase ("After the game") should be followed by a comma before the main clause begins. This signals the reader that the introduction has ended.'},
  {id:'g28',q:'Identify the sentence with an incorrect verb tense shift.',

const PASSAGES_POOL = [
  {id:'p01',title:'Abraham Lincoln, Gettysburg Address (1863)',
   text:`Four score and seven years ago our fathers brought forth on this continent, a new nation, conceived in Liberty, and dedicated to the proposition that all men are created equal.

Now we are engaged in a great civil war, testing whether that nation, or any nation so conceived and so dedicated, can long endure. We are met on a great battle-field of that war. We have come to dedicate a portion of that field, as a final resting place for those who here gave their lives that that nation might live. It is altogether fitting and proper that we should do this.

But, in a larger sense, we cannot dedicate — we cannot consecrate — we cannot hallow — this ground. The brave men, living and dead, who struggled here, have consecrated it, far above our poor power to add or detract.`,
   qs:[
     {q:'The phrase "Four score and seven years ago" refers to how many years before 1863?',opts:['47 years','87 years','107 years','27 years'],ans:1,exp:'A "score" = 20 years. Four score = 80. 80 + 7 = 87. Lincoln was referring to 1776, when the Declaration of Independence was signed.'},
     {q:'Lincoln says the living cannot truly "consecrate" the battlefield because:',opts:['The battle had not yet ended','The soldiers who died there already did so through their sacrifice','Congress had not approved the ceremony','The land belonged to private owners'],ans:1,exp:'Lincoln argues that the soldiers\' sacrifice has already made the ground sacred — far beyond anything speeches or ceremonies can add. This is the emotional core of the address.'},
     {q:'The main purpose of Lincoln\'s speech is to:',opts:['Criticize the generals who commanded at Gettysburg','Explain the causes of the Civil War in detail','Honor the fallen and urge dedication to the Union\'s cause','Announce the end of the war'],ans:2,exp:'Lincoln honors the soldiers, acknowledges no speech can match their sacrifice, and calls the living to finish the work they began — preserving the Union and its founding ideals.'},
   ]},
  {id:'p02',title:'Benjamin Franklin, Poor Richard\'s Almanack (selected sayings)',
   text:`Early to bed and early to rise, makes a man healthy, wealthy, and wise.

Lost time is never found again.

Diligence is the mother of good luck.

An investment in knowledge pays the best interest.

Well done is better than well said.

He that is good for making excuses is seldom good for anything else.

Tell me and I forget. Teach me and I remember. Involve me and I learn.`,
   qs:[
     {q:'"Well done is better than well said" most closely means:',opts:['Cooking is more important than conversation','Actions are more valuable than words','Praise is unnecessary after finishing a task','It is better to work fast than to plan carefully'],ans:1,exp:'Franklin contrasts doing ("well done") with talking ("well said"), arguing that completing a task matters more than discussing it.'},
     {q:'Which saying most directly criticizes the habit of making excuses?',opts:['"Lost time is never found again."','"Diligence is the mother of good luck."','"He that is good for making excuses is seldom good for anything else."','"An investment in knowledge pays the best interest."'],ans:2,exp:'This aphorism directly states that those focused on making excuses have little energy left for anything productive.'},
     {q:'"Tell me and I forget. Teach me and I remember. Involve me and I learn." suggests that:',opts:['Memorization is the best study method','Active participation leads to the deepest learning','Listening to lectures is most efficient','Reading silently is better than being taught'],ans:1,exp:'Franklin presents a progression from passive (being told) to active (being involved), arguing that genuine learning comes from engagement and experience.'},
   ]},
  {id:'p03',title:'Helen Keller, The Story of My Life (1903)',
   text:`The most important day I remember in all my life is the one on which my teacher, Anne Mansfield Sullivan, came to me. I am filled with wonder when I consider the immeasurable contrast between the two lives which it connects. It was the third of April, 1887, three months before I was seven years old.

On the afternoon of that eventful day, I stood on the porch, dumb, expectant. I guessed vaguely from my mother's signs and from the hurrying to and fro in the house that something unusual was about to happen, so I went to the door and waited on the steps.

The afternoon sun penetrated the mass of honeysuckle that covered the porch, and fell on my upturned face. My fingers felt the delicate symmetry of a leaf. I did not know what the future held of marvel or surprise for me.`,
   qs:[
     {q:'Why does Keller call the day Anne Sullivan arrived "the most important day" of her life?',opts:['It was her seventh birthday','It marked a dramatic contrast between life before and after her education','The weather was unusually beautiful','She had been waiting alone on the porch all day'],ans:1,exp:'Keller says she is "filled with wonder when I consider the immeasurable contrast between the two lives which it connects" — Sullivan\'s arrival was the beginning of her education and connection to the world.'},
     {q:'The word "dumb" as Keller uses it most likely means:',opts:['Foolish or unintelligent','Unable to speak; silent','Confused and disoriented','Unaware of her surroundings'],ans:1,exp:'"Dumb" in its older literary sense means unable to speak, not unintelligent. Keller had not yet developed spoken language — Sullivan would later teach her to communicate.'},
     {q:'The detail about Keller touching "the delicate symmetry of a leaf" primarily shows:',opts:['She was bored waiting on the porch','She experienced the world through touch, not sight or hearing','She could already read Braille before Sullivan arrived','She preferred nature to people'],ans:1,exp:'Since Keller was deaf and blind, touch was her primary way of experiencing the world. The detail establishes her as perceptive and curious even before Sullivan\'s arrival.'},
   ]},
  {id:'p04',title:'C.S. Lewis, Mere Christianity (1952)',
   text:`Everyone has heard people quarreling. Sometimes it sounds funny and sometimes it sounds merely unpleasant; but however it sounds, I believe we can learn something very important from listening to the kind of things they say. They say things like this: "How'd you like it if anyone did the same to you?" — "That's my seat, I was there first" — "Leave him alone, he isn't doing you any harm" — "Why should you shove in first?"

People say things like that every day, educated and uneducated, old and young, all over the world. Now what interests me about all these remarks is that the man who makes them is not merely saying that the other man's behavior does not happen to please him. He is appealing to some kind of standard of behavior which he expects the other man to know about.`,
   qs:[
     {q:'According to Lewis, what do all the quarreling remarks have in common?',opts:['They are all childish behavior','They appeal to a shared standard of fairness both parties are expected to know','They involve disputes about physical objects','They show that people are naturally selfish'],ans:1,exp:'Lewis points out that in each case, the speaker appeals to a shared rule — "that\'s fair," "you agreed" — that they assume the other person also knows. This supports his argument about a universal moral law.'},
     {q:'Lewis says quarrelers are appealing to "some kind of standard of behavior which he expects the other man to know about." This suggests Lewis believes:',opts:['People make up rules during arguments','There is a shared moral code humans naturally recognize','Only educated people understand right and wrong','Children are better at fairness than adults'],ans:1,exp:'Lewis is building his argument that a universal moral law exists — a standard people appeal to instinctively, even in trivial quarrels, assuming the other person knows the rules too.'},
     {q:'Lewis\'s use of quarreling examples is best described as:',opts:['An attempt to entertain with humor','A way to illustrate a philosophical point through familiar situations','Proof that most people are rude','A warning about arguing with strangers'],ans:1,exp:'Lewis deliberately uses simple, everyday examples rather than abstract philosophy. Showing that even minor quarrels reveal a shared moral standard makes his larger point about natural law more convincing and accessible.'},
   ]},
  {id:'p05',title:'Booker T. Washington, Up from Slavery (1901)',
   text:`From the time that I can remember having any thoughts about anything, I recall that I had an intense longing to learn to read. I determined, when quite a small child, that, if I accomplished nothing else in life, I would in some way get enough education to enable me to read common books and newspapers.

Soon after we got settled in some manner in our new cabin in West Virginia, I induced my mother to get hold of a book for me. How or where she got it I do not know, but in some way she procured an old copy of Webster's "Blue-Back Speller," which contained the alphabet, followed by such meaningless words as "ab," "ba," "ca," "da." I began at once to devour it, and I think that it is not too much to say that these were among the happiest days of my life.`,
   qs:[
     {q:'Washington describes his longing to read as:',opts:['A requirement placed on him by his parents','Something he only began to want after moving to West Virginia','An intense personal desire he had from his earliest memories','A feeling he shared with all the children in his community'],ans:2,exp:'Washington writes "From the time that I can remember having any thoughts about anything, I recall that I had an intense longing to learn to read" — this desire was deep, personal, and began very early.'},
     {q:'The word "devour" as Washington uses it most nearly means:',opts:['To eat or consume as food','To study or absorb with great eagerness','To criticize or find fault with','To share with others'],ans:1,exp:'"Devour" here is a metaphor for reading with intense hunger and enthusiasm — absorbing the material greedily, the way a hungry person eats food. Washington wanted to learn so much that even a speller felt like a treasure.'},
     {q:'Washington calls the days he first had the speller "among the happiest days of my life" primarily because:',opts:['The book contained exciting stories','He was finally able to teach his friends to read','He had taken the first step toward fulfilling his most powerful ambition','His mother gave him many gifts during this time'],ans:2,exp:'The speller was the beginning of Washington\'s journey toward literacy — the one goal he had set above all others. Getting the book meant his intense longing was finally being addressed.'},
   ]},
  {id:'p06',title:'John F. Kennedy, Inaugural Address (1961)',
   text:`Let the word go forth from this time and place, to friend and foe alike, that the torch has been passed to a new generation of Americans — born in this century, tempered by war, disciplined by a hard and bitter peace, proud of our ancient heritage — and unwilling to witness or permit the slow undoing of those human rights to which this nation has always been committed.

  {id:'p07',title:'Louisa May Alcott, Little Women — Chapter 1 (1868)',
   text:`"Christmas won't be Christmas without any presents," grumbled Jo, lying on the rug.

  {id:'p08',title:'Frederick Douglass, Narrative of the Life of Frederick Douglass (1845)',
   text:`I have often been utterly astonished, since I came to the north, to find persons who could speak of the singing of slaves as evidence of their contentment and happiness. It is impossible to conceive of a greater mistake. Slaves sing most when they are most unhappy. The songs of the slave represent the sorrows of his heart; and he is relieved by them, only as an aching heart is relieved by its tears.

function PBar({pct,color}){return<div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`,background:color}}/></div>;}

function Ring({pct,size=64,label,color}){
  const r=26,c=2*Math.PI*r,d=(pct/100)*c;
  return<div style={{textAlign:'center'}}>
    <svg width={size} height={size} viewBox="0 0 60 60" className="ring-svg">
      <circle cx="30" cy="30" r={r} fill="none" stroke="#2E2850" strokeWidth="5"/>
      <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
    </svg>
    <div style={{fontFamily:'Crimson Pro',fontSize:11,color:'#6B5F4F',marginTop:2}}>{label}</div>
    <div style={{fontFamily:'JetBrains Mono',fontSize:11,color,marginTop:1}}>{pct}%</div>
  </div>;
}

function SecHead({color,supra,title,counter,poolSize}){
  return<div style={{background:'linear-gradient(170deg,#1A1230 0%,#0D0A1A 100%)',padding:'28px 18px 20px',borderBottom:'1px solid #2E2850',position:'relative',overflow:'hidden'}}>
    <div style={{position:'absolute',top:-40,right:-40,width:140,height:140,borderRadius:'50%',background:`radial-gradient(circle,${color}10 0%,transparent 70%)`,pointerEvents:'none'}}/>
    <div style={{color,fontSize:10,letterSpacing:'0.3em',fontFamily:'Crimson Pro',textTransform:'uppercase',marginBottom:4,opacity:0.8}}>{supra}</div>
    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
      <h2 className="playfair" style={{fontSize:24,fontWeight:700,color:'#F2E8D0',margin:0}}>{title}</h2>
      <div style={{textAlign:'right'}}>
        {counter&&<div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#4A3F6B'}}>{counter}</div>}
        {poolSize&&<div style={{fontFamily:'Crimson Pro',fontSize:11,color:'#3A3060',marginTop:1}}>{poolSize} in pool</div>}
      </div>
    </div>
  </div>;
}

function ExpBox({correct,text}){
  return<div style={{background:correct?'rgba(74,140,111,0.10)':'rgba(139,48,48,0.10)',border:`1px solid ${correct?'#4A8C6F':'#8B3030'}`,borderRadius:9,padding:'12px 14px',marginBottom:14}}>
    <div style={{color:correct?'#6ABF94':'#C25050',fontWeight:600,fontFamily:'Crimson Pro',fontSize:14,marginBottom:4}}>{correct?'✓ Correct':'✗ Not quite'}</div>
    <div style={{color:'#9E8F75',fontSize:14,lineHeight:1.6,fontFamily:'Crimson Pro'}}>{text}</div>
  </div>;
}

function ScoreCard({correct,total,color,onShuffle,label}){
  const pct=Math.round((correct/total)*100);
  const msg=pct>=90?'Excellent!':pct>=75?'Strong work.':pct>=60?'Good progress.':'Keep practicing.';
  return<div style={{padding:20,textAlign:'center'}}>
    <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'24px 20px'}}>
      <Ring pct={pct} size={84} label="Score" color={color}/>
      <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0',marginTop:14}}>{correct} / {total}</div>
      <div style={{fontFamily:'Crimson Pro',fontStyle:'italic',color:'#9E8F75',marginTop:4,fontSize:15}}>{msg}</div>
      <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
        <button onClick={onShuffle} style={{background:color+'22',border:`1px solid ${color}44`,borderRadius:8,color,fontFamily:'Crimson Pro',fontSize:15,padding:'10px 0',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%'}}>
          <ShuffleIcon s={16}/> New Random Set
        </button>
      </div>
      <div style={{marginTop:10,fontFamily:'Crimson Pro',fontSize:12,color:'#3A3060'}}>Every restart draws different {label} from the pool</div>
    </div>
  </div>;
}

function NxtBtn({onClick,label,color}){
  return<button onClick={onClick} style={{width:'100%',height:46,borderRadius:9,border:`1px solid ${color}44`,background:color+'18',color,fontFamily:'Crimson Pro',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{label}<ChevR s={16}/></button>;
}

      <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,168,75,0.06) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{color:'#C8A84B',fontSize:10,letterSpacing:'0.35em',fontFamily:'Crimson Pro',marginBottom:10,textTransform:'uppercase',opacity:0.8}}>✦ Classic Learning Test · Grade 8 ✦</div>
      <h1 className="playfair" style={{fontSize:32,fontWeight:700,color:'#F2E8D0',margin:0,lineHeight:1.1,textShadow:'0 0 30px rgba(200,168,75,0.2)'}}>The Athenaeum</h1>
      <p style={{color:'#9E8F75',fontSize:15,marginTop:8,fontStyle:'italic',fontFamily:'Crimson Pro',marginBottom:0}}>CLT8 Study Companion</p>
      <div style={{display:'inline-block',marginTop:10,background:'#C8A84B22',border:'1px solid #C8A84B44',borderRadius:20,padding:'3px 12px'}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#C8A84B',letterSpacing:'0.08em'}}>v5 · May 2026 · Shuffled Pools</span>
      </div>
    </div>

    <div style={{background:'#0F0D1E',borderBottom:'1px solid #1E1C2E',padding:'14px 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <ShuffleIcon s={14}/>
        <span style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F',fontStyle:'italic'}}>Questions shuffle every time you restart — no two rounds are the same.</span>
      </div>
    </div>

    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {secs.map(s=><button key={s.id} onClick={()=>onTab(s.id)} style={{display:'flex',alignItems:'center',gap:14,background:'#161225',border:'1px solid #2E2850',borderRadius:11,padding:'14px 16px',cursor:'pointer',textAlign:'left',width:'100%'}}>
          <div style={{width:40,height:40,borderRadius:10,background:s.color+'18',display:'flex',alignItems:'center',justifyContent:'center',color:s.color,flexShrink:0}}><s.Icon s={20}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div className="playfair" style={{fontSize:15,fontWeight:600,color:'#F2E8D0'}}>{s.label}</div>
            <div style={{fontFamily:'Crimson Pro',fontSize:12,color:'#6B5F4F',marginTop:2}}>{s.sub}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontFamily:'Crimson Pro',fontSize:12,color:s.color}}>{s.stat}</div>
          </div>
        </button>)}
      </div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   VOCAB  (full pool, no shuffle needed — flip through all)
══════════════════════════════════════════════════════════════ */
function VocabDrill({progress,onProgress}){
  const [mode,setMode]=useState('card');
  const [deck]=useState(()=>shuffle(VOCAB_POOL));
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const mastered=progress?.mastered||[];
  const word=deck[idx];
  const toggleMaster=()=>{
    const nm=mastered.includes(word.word)?mastered.filter(w=>w!==word.word):[...mastered,word.word];
    onProgress({...progress,mastered:nm});
  };
  const nav=dir=>{setIdx(i=>(i+dir+deck.length)%deck.length);setFlipped(false);setSelected(null);setAnswered(false);setAnimKey(k=>k+1);};
  const qopts=useMemo(()=>{const c=word.def,o=VOCAB_POOL.filter(v=>v.word!==word.word).map(v=>v.def).sort(()=>Math.random()-0.5).slice(0,3);return[c,...o].sort(()=>Math.random()-0.5);},[idx]);
  const handleQ=opt=>{
    if(answered)return;setSelected(opt);setAnswered(true);
    if(opt===word.def){const nm=mastered.includes(word.word)?mastered:[...mastered,word.word];onProgress({...progress,mastered:nm});}
  };
  return<div>
    <SecHead color="#C8A84B" supra="Verbal Reasoning" title="Vocabulary" counter={`${idx+1}/${deck.length}`} poolSize={VOCAB_POOL.length}/>
    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['card','quiz'].map(m=><button key={m} onClick={()=>{setMode(m);setFlipped(false);setSelected(null);setAnswered(false);}} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:mode===m?'#1C1730':'transparent',color:mode===m?'#C8A84B':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:mode===m?600:400}}>{m==='card'?'Flashcard':'Quiz Mode'}</button>)}
      </div>
      <PBar pct={mastered.length/VOCAB_POOL.length*100} color="#C8A84B"/>
      <div style={{color:'#6B5F4F',fontSize:11,fontFamily:'Crimson Pro',textAlign:'right',marginTop:-10,marginBottom:12}}>{mastered.length} of {VOCAB_POOL.length} mastered</div>

      {mode==='card'?<>
        <div key={animKey} className="fade-up" onClick={()=>setFlipped(f=>!f)} style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'28px 20px',minHeight:190,cursor:'pointer',userSelect:'none',marginBottom:14,position:'relative',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{position:'absolute',top:12,right:14,fontFamily:'Crimson Pro',fontSize:11,color:'#4A3F6B'}}>tap to flip</div>
          {!flipped
            ?<div style={{textAlign:'center'}}>
              <div className="playfair" style={{fontSize:28,fontWeight:700,color:'#F2E8D0',marginBottom:10}}>{word.word}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F',fontStyle:'italic'}}>{word.root}</div>
            </div>
            :<div className="fade-up">
              <div className="playfair" style={{fontSize:17,fontWeight:600,color:'#C8A84B',marginBottom:8}}>{word.word}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:16,color:'#F2E8D0',lineHeight:1.5,marginBottom:8}}>{word.def}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:14,color:'#9E8F75',fontStyle:'italic',lineHeight:1.5}}>"{word.ex}"</div>
            </div>}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={toggleMaster} style={{flex:1,height:44,borderRadius:8,border:`1px solid ${mastered.includes(word.word)?'#C8A84B44':'#2E2850'}`,background:mastered.includes(word.word)?'#C8A84B22':'#161225',color:mastered.includes(word.word)?'#C8A84B':'#9E8F75',fontFamily:'Crimson Pro',fontSize:14,cursor:'pointer'}}>{mastered.includes(word.word)?'★ Mastered':'☆ Mark mastered'}</button>
          <button onClick={()=>nav(1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevR s={18}/></button>
        </div>
      </>:<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:8}}>Define the word</div>
          <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0'}}>{word.word}</div>
          <div style={{fontFamily:'Crimson Pro',fontSize:12,color:'#6B5F4F',fontStyle:'italic',marginTop:4}}>{word.root}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {qopts.map((opt,i)=>{let cls='opt-btn';if(answered){if(opt===word.def)cls+=' ok';else if(opt===selected)cls+=' bad';}else if(opt===selected)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handleQ(opt)}>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===word.def} text={`"${word.word}" — ${word.def}  ·  "${word.ex}"`}/>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={()=>nav(1)} style={{flex:1,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',fontFamily:'Crimson Pro',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>Next Word<ChevR s={16}/></button>
        </div>
      </>}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   GENERIC DRILL  (Grammar & Math share this)
══════════════════════════════════════════════════════════════ */
const ROUND_SIZE = 15;

function QuizDrill({pool,color,supra,title,progress,onProgress,mathMode}){
  const [questions,setQuestions]=useState(()=>shuffle(pool).slice(0,ROUND_SIZE));
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [done,setDone]=useState(false);
  const [roundCorrect,setRoundCorrect]=useState(0);

  const q=questions[idx];

  const startNew=()=>{
    setQuestions(shuffle(pool).slice(0,ROUND_SIZE));
    setIdx(0);setSelected(null);setAnswered(false);setDone(false);setRoundCorrect(0);
  };

  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok)setRoundCorrect(c=>c+1);
  };

  const next=()=>{
    if(idx<questions.length-1){setIdx(i=>i+1);setSelected(null);setAnswered(false);}
    else{
      const score=roundCorrect+(selected===q.ans?1:0);
      const rounds=(progress?.rounds||0)+1;
      const best=Math.max(progress?.best||0,score);
      onProgress({...progress,rounds,best,lastScore:score});
      setDone(true);
    }
  };

  if(done){
    const score=progress?.lastScore||0;
    return<>
      <SecHead color={color} supra={supra} title={title} poolSize={pool.length}/>
      <ScoreCard correct={score} total={ROUND_SIZE} color={color} onShuffle={startNew} label="questions"/>
      <div style={{padding:'0 14px 14px'}}>
        <div style={{background:'#0F0D1E',border:'1px solid #1E1C2E',borderRadius:9,padding:'10px 14px',textAlign:'center'}}>
          <div style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F'}}>All-time best: <span style={{color,fontWeight:600}}>{progress?.best||0} / {ROUND_SIZE}</span> · Rounds played: <span style={{color:'#9E8F75'}}>{progress?.rounds||0}</span></div>
        </div>
      </div>
    </>;
  }

  return<div>
    <SecHead color={color} supra={supra} title={title} counter={`${idx+1}/${ROUND_SIZE}`} poolSize={pool.length}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(idx/ROUND_SIZE)*100} color={color}/>
      <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>{'Question '+(idx+1)}</div>
        <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.6,fontFamily:'Crimson Pro',whiteSpace:'pre-line'}}>{q.q}</div>
      </div>
      {mathMode
        ?<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
          {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)} style={{textAlign:'center',padding:'14px 8px'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontFamily:'JetBrains Mono',fontSize:10,opacity:0.38}}>{String.fromCharCode(65+i)}</span><span style={{fontFamily:'JetBrains Mono',fontSize:17,fontWeight:500}}>{opt}</span></div></button>;})}
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
        </div>}
      {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
      {answered&&<NxtBtn onClick={next} label={idx<questions.length-1?'Next Question':'See Results'} color={color}/>}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   READING DRILL  (4 shuffled passages per round)
══════════════════════════════════════════════════════════════ */
const READING_ROUND = 4;

function ReadingDrill({progress,onProgress}){
  const [passages,setPassages]=useState(()=>shuffle(PASSAGES_POOL).slice(0,READING_ROUND));
  const [pIdx,setPIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [view,setView]=useState('passage');
  const [roundCorrect,setRoundCorrect]=useState(0);
  const [done,setDone]=useState(false);

  const passage=passages[pIdx];
  const q=passage.qs[qIdx];
  const totalQs=passages.reduce((a,p)=>a+p.qs.length,0);
  const doneQs=passages.slice(0,pIdx).reduce((a,p)=>a+p.qs.length,0)+qIdx;

  const startNew=()=>{
    setPassages(shuffle(PASSAGES_POOL).slice(0,READING_ROUND));
    setPIdx(0);setQIdx(0);setSelected(null);setAnswered(false);setView('passage');setRoundCorrect(0);setDone(false);
  };

  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    if(i===q.ans)setRoundCorrect(c=>c+1);
  };

  const next=()=>{
    const isLastQ=qIdx===passage.qs.length-1;
    const isLastP=pIdx===passages.length-1;
    if(!isLastQ){setQIdx(i=>i+1);setSelected(null);setAnswered(false);setView('question');}
    else if(!isLastP){setPIdx(i=>i+1);setQIdx(0);setSelected(null);setAnswered(false);setView('passage');}
    else{
      const score=roundCorrect+(selected===q.ans?1:0);
      const rounds=(progress?.rounds||0)+1;
      const best=Math.max(progress?.best||0,score);
      onProgress({...progress,rounds,best,lastScore:score});
      setDone(true);
    }
  };

  if(done){
    const score=progress?.lastScore||0;
    return<>
      <SecHead color="#7A9EC8" supra="Reading Comprehension" title="Classical Passages" poolSize={PASSAGES_POOL.length}/>
      <ScoreCard correct={score} total={totalQs} color="#7A9EC8" onShuffle={startNew} label="passages"/>
      <div style={{padding:'0 14px 14px'}}>
        <div style={{background:'#0F0D1E',border:'1px solid #1E1C2E',borderRadius:9,padding:'10px 14px',textAlign:'center'}}>
          <div style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F'}}>All-time best: <span style={{color:'#7A9EC8',fontWeight:600}}>{progress?.best||0} / {totalQs}</span> · Rounds: <span style={{color:'#9E8F75'}}>{progress?.rounds||0}</span></div>
        </div>
      </div>
    </>;
  }

  return<div>
    <SecHead color="#7A9EC8" supra="Reading Comprehension" title={passage.title.split(',')[0]} counter={`Passage ${pIdx+1}/${passages.length}`} poolSize={PASSAGES_POOL.length}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(doneQs/totalQs)*100} color="#7A9EC8"/>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['passage','question'].map(v=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:view===v?'#1C1730':'transparent',color:view===v?'#7A9EC8':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:view===v?600:400}}>{v==='passage'?'Passage':'Question'}</button>)}
      </div>
      {view==='passage'?<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#7A9EC8',fontSize:12,fontFamily:'Crimson Pro',fontStyle:'italic',marginBottom:14,lineHeight:1.4,opacity:0.9}}>{passage.title}</div>
          {passage.text.split('\n\n').map((p,i)=><p key={i} style={{fontFamily:'Crimson Pro',fontSize:15,lineHeight:1.75,color:'#D4C8B0',margin:i===0?0:'14px 0 0'}}>{p.trim()}</p>)}
        </div>
        <NxtBtn onClick={()=>setView('question')} label="Go to Questions" color="#7A9EC8"/>
      </>:<>
        <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Question {qIdx+1} of {passage.qs.length}</div>
          <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.55,fontFamily:'Crimson Pro'}}>{q.q}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
        {answered&&<NxtBtn onClick={next} label={qIdx<passage.qs.length-1?'Next Question':pIdx<passages.length-1?'Next Passage':'See Results'} color="#7A9EC8"/>}
      </>}
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('home');
  const [progress,setProgress]=useState(()=>gs('progress')||{vocab:{mastered:[]},grammar:{rounds:0,best:0},reading:{rounds:0,best:0},math:{rounds:0,best:0}});
  const save=(key,val)=>{const np={...progress,[key]:val};setProgress(np);ss('progress',np);};
  const tabs=[
    {id:'home',   label:'Home',   Icon:HomeIcon, color:'#C8A84B'},
    {id:'verbal', label:'Verbal', Icon:BookIcon, color:'#C8A84B'},
    {id:'grammar',label:'Grammar',Icon:PenIcon,  color:'#B87A6A'},
    {id:'reading',label:'Reading',Icon:DocIcon,  color:'#7A9EC8'},
    {id:'math',   label:'Math',   Icon:SigmaIcon,color:'#8AB87A'},
  ];
  return<div style={{background:'#0D0A1A',minHeight:'100vh',fontFamily:"'Crimson Pro',Georgia,serif"}}>
    <main style={{paddingBottom:72,minHeight:'100vh'}}>
      <div className="fade-up" key={tab}>
        {tab==='home'   &&<HomeScreen progress={progress} onTab={setTab}/>}
        {tab==='verbal' &&<VocabDrill progress={progress.vocab} onProgress={v=>save('vocab',v)}/>}
        {tab==='grammar'&&<QuizDrill pool={GRAMMAR_POOL} color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice" progress={progress.grammar} onProgress={v=>save('grammar',v)} mathMode={false}/>}
        {tab==='reading'&&<ReadingDrill progress={progress.reading} onProgress={v=>save('reading',v)}/>}
        {tab==='math'   &&<QuizDrill pool={MATH_POOL} color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice" progress={progress.math} onProgress={v=>save('math',v)} mathMode={true}/>}
      </div>
    </main>
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(13,10,26,0.97)',borderTop:'1px solid #2E2850',display:'flex',zIndex:100,backdropFilter:'blur(10px)',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label,Icon,color})=>{const active=tab===id;return<button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>setTab(id)} style={{color:active?color:undefined}}><Icon s={20}/><span>{label}</span></button>;})}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
