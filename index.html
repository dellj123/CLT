/* ── SHARED UI ── */
function PBar({pct,color}){return<div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`,background:color}}/></div>;}

function Ring({pct,size=64,label,color}){
  const r=26,c=2*Math.PI*r,d=(pct/100)*c;
  return<div style={{textAlign:'center'}}>
    <svg width={size} height={size} viewBox="0 0 60 60" className="ring-svg">
      <circle cx="30" cy="30" r={r} fill="none" stroke="#2E2850" strokeWidth="5"/>
      <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
    </svg>
    <div style={{fontFamily:'Crimson Pro',fontSize:11,color:'#6B5F4F',marginTop:2}}>{label}</div>
    <div style={{fontFamily:'JetBrains Mono',fontSize:11,color,marginTop:1}}>{pct}%</div>
  </div>;
}

function SecHead({color,supra,title,counter}){
  return<div style={{background:'linear-gradient(170deg,#1A1230 0%,#0D0A1A 100%)',padding:'32px 18px 22px',borderBottom:'1px solid #2E2850',position:'relative',overflow:'hidden'}}>
    <div style={{position:'absolute',top:-40,right:-40,width:140,height:140,borderRadius:'50%',background:`radial-gradient(circle,${color}10 0%,transparent 70%)`,pointerEvents:'none'}}/>
    <div style={{color,fontSize:10,letterSpacing:'0.3em',fontFamily:'Crimson Pro',textTransform:'uppercase',marginBottom:6,opacity:0.8}}>{supra}</div>
    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
      <h2 className="playfair" style={{fontSize:26,fontWeight:700,color:'#F2E8D0',margin:0}}>{title}</h2>
      {counter&&<div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#4A3F6B'}}>{counter}</div>}
    </div>
  </div>;
}

function ExpBox({correct,text}){
  return<div style={{background:correct?'rgba(74,140,111,0.10)':'rgba(139,48,48,0.10)',border:`1px solid ${correct?'#4A8C6F':'#8B3030'}`,borderRadius:9,padding:'12px 14px',marginBottom:14}}>
    <div style={{color:correct?'#6ABF94':'#C25050',fontWeight:600,fontFamily:'Crimson Pro',fontSize:14,marginBottom:4}}>{correct?'✓ Correct':'✗ Not quite'}</div>
    <div style={{color:'#9E8F75',fontSize:14,lineHeight:1.6,fontFamily:'Crimson Pro'}}>{text}</div>
  </div>;
}

function ResCard({correct,total,color,onReset}){
  const pct=Math.round((correct/total)*100);
  const msg=pct>=90?'Excellent work!':pct>=75?'Strong performance.':pct>=60?'Good progress.':'Keep practicing.';
  return<div style={{padding:20,textAlign:'center'}}>
    <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'28px 20px'}}>
      <Ring pct={pct} size={90} label="Score" color={color}/>
      <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0',marginTop:16}}>{correct} / {total}</div>
      <div style={{fontFamily:'Crimson Pro',fontStyle:'italic',color:'#9E8F75',marginTop:6,fontSize:16}}>{msg}</div>
      <button onClick={onReset} style={{marginTop:20,background:color+'22',border:`1px solid ${color}44`,borderRadius:8,color,fontFamily:'Crimson Pro',fontSize:15,padding:'10px 28px',cursor:'pointer'}}>Try Again</button>
    </div>
  </div>;
}

function NxtBtn({onClick,label,color}){
  return<button onClick={onClick} style={{width:'100%',height:46,borderRadius:9,border:`1px solid ${color}44`,background:color+'18',color,fontFamily:'Crimson Pro',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{label}<ChevR s={16}/></button>;
}

/* ── VOCAB ── */
function VocabDrill({progress,onProgress}){
  const [mode,setMode]=useState('card');
  const [idx,setIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const mastered=progress?.mastered||[];
  const word=VOCAB[idx];
  const toggleMaster=()=>{
    const nm=mastered.includes(word.word)?mastered.filter(w=>w!==word.word):[...mastered,word.word];
    onProgress({...progress,mastered:nm});
  };
  const nav=dir=>{
    if(mode==='card'){setIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);setFlipped(false);setAnimKey(k=>k+1);}
    else{setQIdx(i=>(i+dir+VOCAB.length)%VOCAB.length);setSelected(null);setAnswered(false);}
  };
  const qw=VOCAB[qIdx];
  const qopts=(()=>{const c=qw.def,o=VOCAB.filter(v=>v.word!==qw.word).map(v=>v.def).sort(()=>Math.random()-0.5).slice(0,3);return[c,...o].sort(()=>Math.random()-0.5);})();
  const handleQ=opt=>{
    if(answered)return;setSelected(opt);setAnswered(true);
    if(opt===qw.def){const nm=mastered.includes(qw.word)?mastered:[...mastered,qw.word];onProgress({...progress,mastered:nm});}
  };
  const cur=mode==='card'?idx:qIdx;
  return<div>
    <SecHead color="#C8A84B" supra="Verbal Reasoning" title="Vocabulary" counter={`${cur+1} / ${VOCAB.length}`}/>
    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['card','quiz'].map(m=><button key={m} onClick={()=>{setMode(m);setFlipped(false);}} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:mode===m?'#1C1730':'transparent',color:mode===m?'#C8A84B':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:mode===m?600:400}}>{m==='card'?'Flashcard':'Quiz Mode'}</button>)}
      </div>
      <PBar pct={mastered.length/VOCAB.length*100} color="#C8A84B"/>
      <div style={{color:'#6B5F4F',fontSize:11,fontFamily:'Crimson Pro',textAlign:'right',marginTop:-10,marginBottom:12}}>{mastered.length} of {VOCAB.length} mastered</div>
      {mode==='card'?<>
        <div key={animKey} className="fade-up" onClick={()=>setFlipped(f=>!f)} style={{background:'#161225',border:'1px solid #2E2850',borderRadius:14,padding:'28px 20px',minHeight:200,cursor:'pointer',userSelect:'none',marginBottom:14,position:'relative',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{position:'absolute',top:12,right:14,fontFamily:'Crimson Pro',fontSize:11,color:'#4A3F6B'}}>tap to flip</div>
          {!flipped
            ?<div style={{textAlign:'center'}}>
              <div className="playfair" style={{fontSize:28,fontWeight:700,color:'#F2E8D0',marginBottom:10}}>{word.word}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:13,color:'#6B5F4F',fontStyle:'italic'}}>{word.root}</div>
            </div>
            :<div className="fade-up">
              <div className="playfair" style={{fontSize:18,fontWeight:600,color:'#C8A84B',marginBottom:10}}>{word.word}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:16,color:'#F2E8D0',lineHeight:1.55,marginBottom:10}}>{word.def}</div>
              <div style={{fontFamily:'Crimson Pro',fontSize:14,color:'#9E8F75',fontStyle:'italic',lineHeight:1.5}}>"{word.ex}"</div>
            </div>}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={toggleMaster} style={{flex:1,height:44,borderRadius:8,border:`1px solid ${mastered.includes(word.word)?'#C8A84B44':'#2E2850'}`,background:mastered.includes(word.word)?'#C8A84B22':'#161225',color:mastered.includes(word.word)?'#C8A84B':'#9E8F75',fontFamily:'Crimson Pro',fontSize:14,cursor:'pointer'}}>{mastered.includes(word.word)?'★ Mastered':'☆ Mark mastered'}</button>
          <button onClick={()=>nav(1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevR s={18}/></button>
        </div>
      </>:<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Define the word</div>
          <div className="playfair" style={{fontSize:22,fontWeight:700,color:'#F2E8D0'}}>{qw.word}</div>
          <div style={{fontFamily:'Crimson Pro',fontSize:12,color:'#6B5F4F',fontStyle:'italic',marginTop:4}}>{qw.root}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {qopts.map((opt,i)=>{let cls='opt-btn';if(answered){if(opt===qw.def)cls+=' ok';else if(opt===selected)cls+=' bad';}else if(opt===selected)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handleQ(opt)}>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===qw.def} text={`"${qw.word}" — ${qw.def}  ·  "${qw.ex}"`}/>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>nav(-1)} style={{width:44,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#9E8F75',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><ChevL s={18}/></button>
          <button onClick={()=>nav(1)} style={{flex:1,height:44,borderRadius:8,border:'1px solid #2E2850',background:'#161225',color:'#C8A84B',cursor:'pointer',fontFamily:'Crimson Pro',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>Next Word<ChevR s={16}/></button>
        </div>
      </>}
    </div>
  </div>;
}

/* ── GRAMMAR ── */
function GrammarDrill({progress,onProgress}){
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [done,setDone]=useState(false);
  const correct=progress?.correct||[],wrong=progress?.wrong||[];
  const q=GRAMMAR[idx];
  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok&&!correct.includes(q.id))onProgress({...progress,correct:[...correct,q.id],wrong:wrong.filter(w=>w!==q.id)});
    if(!ok&&!wrong.includes(q.id))onProgress({...progress,wrong:[...wrong,q.id],correct:correct.filter(c=>c!==q.id)});
  };
  const next=()=>{if(idx<GRAMMAR.length-1){setIdx(i=>i+1);setSelected(null);setAnswered(false);}else setDone(true);};
  if(done)return<><SecHead color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice"/><ResCard correct={correct.length} total={GRAMMAR.length} color="#B87A6A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/></>;
  return<div>
    <SecHead color="#B87A6A" supra="Grammar & Usage" title="Grammar Practice" counter={`${idx+1}/${GRAMMAR.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(idx/GRAMMAR.length)*100} color="#B87A6A"/>
      <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Question {idx+1}</div>
        <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.6,fontFamily:'Crimson Pro'}}>{q.q}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
        {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
      </div>
      {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
      {answered&&<NxtBtn onClick={next} label={idx<GRAMMAR.length-1?'Next Question':'See Results'} color="#B87A6A"/>}
    </div>
  </div>;
}

/* ── READING ── */
function ReadingDrill({progress,onProgress}){
  const [pIdx,setPIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [view,setView]=useState('passage');
  const correct=progress?.correct||[],wrong=progress?.wrong||[];
  const passage=PASSAGES[pIdx],q=passage.qs[qIdx],qId=`${pIdx}-${qIdx}`;
  const handle=i=>{
    if(answered)return;setSelected(i);setAnswered(true);
    const ok=i===q.ans;
    if(ok&&!correct.includes(qId))onProgress({...progress,correct:[...correct,qId],wrong:wrong.filter(w=>w!==qId)});
    if(!ok&&!wrong.includes(qId))onProgress({...progress,wrong:[...wrong,qId],correct:correct.filter(c=>c!==qId)});
  };
  const next=()=>{
    if(qIdx<passage.qs.length-1){setQIdx(i=>i+1);setSelected(null);setAnswered(false);setView('question');}
    else if(pIdx<PASSAGES.length-1){setPIdx(i=>i+1);setQIdx(0);setSelected(null);setAnswered(false);setView('passage');}
  };
  const rTotal=PASSAGES.reduce((a,p)=>a+p.qs.length,0);
  const rDone=PASSAGES.slice(0,pIdx).reduce((a,p)=>a+p.qs.length,0)+qIdx;
  return<div>
    <SecHead color="#7A9EC8" supra="Reading Comprehension" title="Classical Passages" counter={`${pIdx+1}/${PASSAGES.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(rDone/rTotal)*100} color="#7A9EC8"/>
      <div style={{display:'flex',background:'#0D0A1A',borderRadius:8,padding:3,gap:3,marginBottom:14}}>
        {['passage','question'].map(v=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer',background:view===v?'#1C1730':'transparent',color:view===v?'#7A9EC8':'#6B5F4F',fontFamily:'Crimson Pro',fontSize:14,fontWeight:view===v?600:400}}>{v==='passage'?'Passage':'Question'}</button>)}
      </div>
      {view==='passage'?<>
        <div style={{background:'#161225',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#7A9EC8',fontSize:12,fontFamily:'Crimson Pro',fontStyle:'italic',marginBottom:14,lineHeight:1.4}}>{passage.title}</div>
          {passage.text.split('\n\n').map((p,i)=><p key={i} style={{fontFamily:'Crimson Pro',fontSize:15,lineHeight:1.75,color:'#D4C8B0',margin:i===0?0:'14px 0 0'}}>{p.trim()}</p>)}
        </div>
        <NxtBtn onClick={()=>setView('question')} label="Go to Questions" color="#7A9EC8"/>
      </>:<>
        <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
          <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Question {qIdx+1} of {passage.qs.length}</div>
          <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.55,fontFamily:'Crimson Pro'}}>{q.q}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)}><span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B5F4F',marginRight:6}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;})}
        </div>
        {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
        {answered&&(pIdx<PASSAGES.length-1||qIdx<passage.qs.length-1)&&<NxtBtn onClick={next} label={qIdx<passage.qs.length-1?'Next Question':'Next Passage'} color="#7A9EC8"/>}
      </>}
    </div>
  </div>;
}

  };
  const next=()=>{if(idx<MATH.length-1){setIdx(i=>i+1);setSelected(null);setAnswered(false);}else setDone(true);};
  if(done)return<><SecHead color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice"/><ResCard correct={correct.length} total={MATH.length} color="#8AB87A" onReset={()=>{setIdx(0);setSelected(null);setAnswered(false);setDone(false);}}/></>;
  return<div>
    <SecHead color="#8AB87A" supra="Quantitative Reasoning" title="Math Practice" counter={`${idx+1}/${MATH.length}`}/>
    <div style={{padding:'14px'}}>
      <PBar pct={(idx/MATH.length)*100} color="#8AB87A"/>
      <div style={{background:'#1C1730',border:'1px solid #2E2850',borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{color:'#6B5F4F',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',fontFamily:'Crimson Pro',marginBottom:10}}>Problem {idx+1}</div>
        <div style={{color:'#F2E8D0',fontSize:16,lineHeight:1.65,fontFamily:'Crimson Pro',whiteSpace:'pre-line'}}>{q.q}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
        {q.opts.map((opt,i)=>{let cls='opt-btn';if(answered){if(i===q.ans)cls+=' ok';else if(selected===i)cls+=' bad';}else if(selected===i)cls+=' sel';return<button key={i} className={cls} disabled={answered} onClick={()=>handle(i)} style={{textAlign:'center',padding:'14px 8px'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontFamily:'JetBrains Mono',fontSize:10,opacity:0.38}}>{String.fromCharCode(65+i)}</span><span style={{fontFamily:'JetBrains Mono',fontSize:17,fontWeight:500}}>{opt}</span></div></button>;})}
      </div>
      {answered&&<ExpBox correct={selected===q.ans} text={q.exp}/>}
      {answered&&<NxtBtn onClick={next} label={idx<MATH.length-1?'Next Problem':'See Results'} color="#8AB87A"/>}
    </div>
  </div>;
}

/* ── APP ── */
function App(){
  const [tab,setTab]=useState('home');
  const [progress,setProgress]=useState(()=>{const s=gs('progress');return s||{vocab:{mastered:[],seen:[]},grammar:{correct:[],wrong:[]},reading:{correct:[],wrong:[]},math:{correct:[],wrong:[]}};});
  const save=(key,val)=>{const np={...progress,[key]:val};setProgress(np);ss('progress',np);};
  const tabs=[
    {id:'home',   label:'Home',   Icon:HomeIcon, color:'#C8A84B'},
    {id:'verbal', label:'Verbal', Icon:BookIcon, color:'#C8A84B'},
    {id:'grammar',label:'Grammar',Icon:PenIcon,  color:'#B87A6A'},
    {id:'reading',label:'Reading',Icon:DocIcon,  color:'#7A9EC8'},
    {id:'math',   label:'Math',   Icon:SigmaIcon,color:'#8AB87A'},
  ];
  return<div style={{background:'#0D0A1A',minHeight:'100vh',fontFamily:"'Crimson Pro',Georgia,serif"}}>
    <main style={{paddingBottom:72,minHeight:'100vh'}}>
      <div className="fade-up" key={tab}>
        {tab==='home'   &&<HomeScreen  progress={progress} onTab={setTab}/>}
        {tab==='verbal' &&<VocabDrill  progress={progress.vocab}   onProgress={v=>save('vocab',v)}/>}
        {tab==='grammar'&&<GrammarDrill progress={progress.grammar} onProgress={v=>save('grammar',v)}/>}
        {tab==='reading'&&<ReadingDrill progress={progress.reading} onProgress={v=>save('reading',v)}/>}
        {tab==='math'   &&<MathDrill   progress={progress.math}    onProgress={v=>save('math',v)}/>}
      </div>
    </main>
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(13,10,26,0.97)',borderTop:'1px solid #2E2850',display:'flex',zIndex:100,backdropFilter:'blur(10px)',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label,Icon,color})=>{const active=tab===id;return<button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>setTab(id)} style={{color:active?color:undefined}}><Icon s={20}/><span>{label}</span></button>;})}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
